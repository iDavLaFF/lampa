let _preModalFocused = null; // TV focus before modal opened

async function openModal(item) {
  // Save current TV focus to restore on close
  if (TV.active || TV.focused) {
    _preModalFocused = TV.focused;
  }
  const bd    = document.getElementById('modal-backdrop');
  const isTV  = item.media_type === 'tv' || !!item.name;
  const title = item.title || item.name || 'Untitled';
  const year  = (item.release_date || item.first_air_date || '').slice(0, 4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : null;
  const overview = item.overview || 'No description available.';

  // ── Hero изображение ──────────────────────────────────
  const heroImg = document.getElementById('modal-backdrop-img');
  heroImg.style.backgroundImage = item.backdrop_path
    ? `url(${IMG_BASE}/w1280${item.backdrop_path})`
    : 'linear-gradient(135deg,#1a0533,#3d1a6b)';
  heroImg.style.backgroundSize     = 'cover';
  heroImg.style.backgroundPosition = 'center';

  // ── Заголовок + мета ─────────────────────────────────
  document.getElementById('modal-title-text').textContent = title;
  const genres = (item.genre_ids || []).slice(0, 3)
    .map(id => GENRE_MAP[id]).filter(Boolean)
    .map(g => `<span class="modal-genre-tag">${g}</span>`).join('');
  document.getElementById('modal-meta-row').innerHTML = `
    ${year ? `<span>${year}</span><span class="dot-sep"></span>` : ''}
    <span>${isTV ? 'Series' : 'Movie'}</span>
    ${rating ? `<span class="dot-sep"></span><span class="modal-score">★ ${rating}</span>` : ''}
    ${genres ? `<span class="dot-sep"></span>${genres}` : ''}
  `;

  document.getElementById('modal-desc-text').textContent = overview;

  // ── Play ──────────────────────────────────────────────
  document.getElementById('modal-play-btn').onclick = () => {
    showToast('▶ Playing ' + title);
    closeModal();
  };

  // ── My List кнопка ───────────────────────────────────
  updateMyListBtn(item);

  // ── Скелетоны пока грузятся credits ──────────────────
  renderPersonsSkeletons();

  bd.classList.add('open');
  document.getElementById('modal-box').scrollTop = 0;

  // TV mode: focus first modal button
  if (TV.active) {
    setTimeout(() => {
      const playBtn = document.querySelector('#modal-box .btn-play');
      if (playBtn) TV.setFocus(playBtn);
    }, 350);
  }

  // ── Грузим credits параллельно ───────────────────────
  try {
    const creditsPath = isTV ? `/tv/${item.id}/credits` : `/movie/${item.id}/credits`;
    const detailPath  = isTV ? `/tv/${item.id}`          : `/movie/${item.id}`;
    const [credits, details] = await Promise.all([
      tmdb(creditsPath),
      tmdb(detailPath),
    ]);
    renderPersons(details, credits, isTV);
  } catch (e) {
    console.warn('Credits load error:', e);
    document.getElementById('modal-credits-wrap').style.display = 'none';
  }
}

function updateMyListBtn(item) {
  const btn   = document.getElementById('modal-list-btn');
  const icon  = btn.querySelector('.mylist-icon');
  const label = document.getElementById('modal-list-label');
  const inList = myListHas(item.id);

  btn.classList.toggle('in-list', inList);
  icon.textContent  = inList ? '♥' : '♡';
  label.textContent = inList ? 'In My List' : 'My List';

  btn.onclick = () => {
    const added = myListToggle(item);
    btn.classList.toggle('in-list', added);
    icon.textContent  = added ? '♥' : '♡';
    label.textContent = added ? 'In My List' : 'My List';
    showToast(added ? '♥ Added to My List' : '✕ Removed from My List');
    // Синхронизируем ♥ на всех карточках в DOM
    syncCardListState(item.id, added);
    if (document.getElementById('mylist-page').classList.contains('open')) renderMyList();
  };
}

// ── Единый список: crew + cast ───────────────────────────
function renderPersonsSkeletons() {
  const track = document.getElementById('modal-cast-track');
  track.innerHTML = '';
  document.getElementById('modal-credits-wrap').style.display = '';
  for (let i = 0; i < 10; i++) {
    const sk = document.createElement('div');
    sk.className = 'cast-skeleton';
    sk.innerHTML = `
      <div class="cast-skeleton-photo"><div class="skeleton-shimmer" style="width:100%;height:100%"></div></div>
      <div class="skeleton-shimmer" style="height:10px;width:70%;border-radius:4px;margin:0 auto 4px"></div>
      <div class="skeleton-shimmer" style="height:9px;width:50%;border-radius:4px;margin:0 auto"></div>`;
    track.appendChild(sk);
  }
}

function renderPersons(details, credits, isTV) {
  const track = document.getElementById('modal-cast-track');
  const wrap  = document.getElementById('modal-credits-wrap');

  const list = [];

  // 1. Crew — сначала (режиссёр, продюсер, сценарист и т.д.)
  if (isTV && details.created_by && details.created_by.length) {
    details.created_by.forEach(p => list.push({ ...p, role: 'Showrunner', isCrew: true }));
  }

  const crewRoles = isTV
    ? [{ job: 'Creator',  label: 'Creator'  }]
    : [{ job: 'Director', label: 'Director' }];
  for (const { job, label } of crewRoles) {
    const member = (credits.crew || []).find(m => m.job === job);
    if (member) list.push({ ...member, role: label, isCrew: true });
  }

  // 2. Cast — после crew
  (credits.cast || []).slice(0, 15).forEach(p => list.push({ ...p, isCrew: false }));

  if (!list.length) { wrap.style.display = 'none'; return; }

  track.innerHTML = '';
  list.forEach(person => {
    const card = document.createElement('div');
    card.className = 'cast-card';

    const photoUrl  = person.profile_path ? `${IMG_BASE}/w185${person.profile_path}` : null;
    const sublabel  = person.isCrew
      ? person.role
      : (person.character || '').replace(/\(.*?\)/g, '').trim();
    const subClass  = person.isCrew ? 'cast-character is-crew' : 'cast-character';

    card.innerHTML = `
      ${photoUrl
        ? `<img class="cast-photo" src="${photoUrl}" alt="${person.name}" loading="lazy">`
        : `<div class="cast-photo-placeholder">👤</div>`}
      <div class="cast-name">${person.name}</div>
      ${sublabel ? `<div class="${subClass}">${sublabel}</div>` : ''}`;

    track.appendChild(card);
  });

  wrap.style.display = '';
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-backdrop')) {
    document.getElementById('modal-backdrop').classList.remove('open');
    // Restore TV focus to element that was focused before modal
    if ((TV.active || TV.focused) && _preModalFocused && _preModalFocused.isConnected) {
      const saved = _preModalFocused;
      _preModalFocused = null;
      setTimeout(() => TV.setFocus(saved), 150);
    } else {
      _preModalFocused = null;
    }
  }
}

let _searchTimer = null;
let _lastQuery   = '';

function openSearch() {
  document.getElementById('search-overlay').classList.add('open');
  setTimeout(() => document.getElementById('search-input').focus(), 80);
  // Показываем trending сразу если поле пустое
  if (!document.getElementById('search-input').value.trim()) {
    showSearchTrending();
  }
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-input').value = '';
  _lastQuery = '';
}

async function showSearchTrending() {
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '<div class="search-status" style="padding:32px 0 16px">🔥 Trending Now</div>';
  try {
    const data = await tmdb('/trending/all/week');
    const items = (data.results || [])
      .filter(i => (i.media_type === 'movie' || i.media_type === 'tv') && i.poster_path)
      .slice(0, 12);
    if (!document.getElementById('search-input').value.trim()) {
      // ещё не начали печатать — показываем
      const grid = document.createElement('div');
      grid.className = 'search-grid';
      items.forEach(item => {
        const card = buildCard(item, 'poster', 'sm');
        grid.appendChild(card);
      });
      resultsEl.appendChild(grid);
    }
  } catch { /* тихо игнорируем */ }
}

async function runSearch(query) {
  _lastQuery = query;
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '<div class="search-status">Searching…</div>';

  try {
    const data = await tmdb('/search/multi', { query, include_adult: false, page: 1 });
    if (query !== _lastQuery) return; // устаревший запрос

    const results = (data.results || []).filter(i =>
      (i.media_type === 'movie' || i.media_type === 'tv') &&
      (i.poster_path || i.backdrop_path)
    );

    if (!results.length) {
      resultsEl.innerHTML = `<div class="search-status">No results for "<strong>${query}</strong>"</div>`;
      return;
    }

    const movies = results.filter(i => i.media_type === 'movie');
    const series = results.filter(i => i.media_type === 'tv');
    const total  = results.length;

    resultsEl.innerHTML = `<div class="search-count">${total} result${total !== 1 ? 's' : ''} for "<strong>${query}</strong>"</div>`;

    const renderGroup = (label, items) => {
      if (!items.length) return;
      const titleEl = document.createElement('div');
      titleEl.className = 'search-section-title';
      titleEl.textContent = label;
      resultsEl.appendChild(titleEl);

      const grid = document.createElement('div');
      grid.className = 'search-grid';
      items.forEach((item, i) => {
        const card = buildCard(item, 'poster', 'sm');
        card.style.animationDelay = `${i * 30}ms`;
        card.classList.add('search-card-appear');
        grid.appendChild(card);
      });
      resultsEl.appendChild(grid);
    };

    renderGroup('Movies', movies);
    renderGroup('Series', series);

  } catch (err) {
    if (query === _lastQuery) {
      resultsEl.innerHTML = '<div class="search-status">Search failed. Try again.</div>';
    }
  }
}

// Жанры для строк на detail page (топ-8 популярных)
const DETAIL_GENRES = [
  { id: 28,    label: 'Action'       },
  { id: 18,    label: 'Drama'        },
  { id: 35,    label: 'Comedy'       },
  { id: 27,    label: 'Horror'       },

  { id: 14,    label: 'Fantasy'      },

];

async function openDetailPage(opts) {
  // opts: { name, logoUrl, location, type:'network'|'studio', ids, primaryId }
  const page = document.getElementById('detail-page');

  // Заполняем шапку
  const logoEl = document.getElementById('detail-logo');
  logoEl.src = opts.logoUrl || '';
  logoEl.style.display = opts.logoUrl ? '' : 'none';
  document.getElementById('detail-name').textContent     = opts.name;
  document.getElementById('detail-location').textContent = opts.location || '';

  // Очищаем строки и показываем скелетоны
  const rowsEl = document.getElementById('detail-rows');
  rowsEl.innerHTML = '';

  // Открываем страницу (слайд)
  page.scrollTop = 0;
  page.classList.add('open');

  const isNetwork = opts.type === 'network';
  const endpoint  = isNetwork ? '/discover/tv'    : '/discover/movie';
  const filterKey = isNetwork ? 'with_networks'   : 'with_companies';
  const mediaType = isNetwork ? 'tv'              : 'movie';
  const noAnim    = isNetwork ? {}                : { without_genres: '16' };

  // ── Строим список запросов ──────────────────────────────
  const today = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
  const dateMaxKey = isNetwork ? 'air_date.lte'      : 'release_date.lte';
  const dateMinKey = isNetwork ? 'air_date.gte'      : 'release_date.gte';

  const rowDefs = [
    {
      title: isNetwork
        ? `New ${opts.name} Series`
        : `New ${opts.name} Films`,
      params: {
        [filterKey]:  opts.ids,
        sort_by:      isNetwork ? 'first_air_date.desc' : 'primary_release_date.desc',
        [dateMaxKey]: today,
        [dateMinKey]: '2015-01-01',
        'vote_count.gte': '100',
        ...noAnim,
      },
    },
    {
      title: isNetwork
        ? `Popular on ${opts.name}`
        : `Popular ${opts.name} Films`,
      params: { [filterKey]: opts.ids, sort_by: 'popularity.desc', ...noAnim },
    },
    {
      title: isNetwork
        ? `Best of ${opts.name}`
        : `Best ${opts.name} Films`,
      params: { [filterKey]: opts.ids, sort_by: 'vote_average.desc', 'vote_count.gte': '200', ...noAnim },
    },
    // жанровые строки
    ...DETAIL_GENRES.map(g => ({
      title: g.label,
      params: { [filterKey]: opts.ids, with_genres: String(g.id), sort_by: 'popularity.desc' },
    })),
  ];

  // Рендерим скелетоны сразу
  rowDefs.forEach((def, i) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    rowEl.id = `detail-row-${i}`;
    rowEl.innerHTML = `
      <div class="row-header">
        <span class="row-title">${def.title}</span>
        <a class="row-link" id="detail-seeall-${i}">See all →</a>
      </div>
      <div class="row-scroll-wrap">
        <div class="cards-track track-poster" id="detail-track-${i}"></div>
      </div>
    `;
    rowsEl.appendChild(rowEl);
    // Безопасно вешаем обработчик через JS (избегаем проблем с кавычками в JSON в атрибутах)
    const seeAllEl = rowEl.querySelector(`#detail-seeall-${i}`);
    const capturedDef = def;
    seeAllEl.onclick = () => openBrowsePage(capturedDef.title, endpoint, capturedDef.params, mediaType);
    renderSkeletons(`detail-track-${i}`, 8, 'poster', 'md');
  });

  // Загружаем данные параллельно
  const results = await Promise.allSettled(
    rowDefs.map(def => tmdb(endpoint, def.params))
  );

  results.forEach((res, i) => {
    const trackEl = document.getElementById(`detail-track-${i}`);
    if (!trackEl) return;
    if (res.status !== 'fulfilled' || !(res.value.results || []).length) {
      // Скрываем пустую строку
      const rowEl = document.getElementById(`detail-row-${i}`);
      if (rowEl) rowEl.style.display = 'none';
      return;
    }
    const items = (res.value.results || []).map(item => ({ ...item, media_type: mediaType }));
    populateRow(`detail-track-${i}`, items.slice(0, 20), 'poster', 'md');
  });
}

function navTo(page, el) {
  document.querySelectorAll('.nav-links li').forEach(li => li.classList.remove('active'));
  el.closest('li').classList.add('active');

  if (page === 'home') {
    closeSectionPage();
    closeMyList(false);
    return false;
  }
  if (page === 'movies' || page === 'series' || page === 'kids' || page === 'anime') {
    closeMyList(false);
    closeSectionPage(false);  // don't reset nav — we're switching sections
    openSectionPage(page);
    return false;
  }
  if (page === 'mylist') {
    closeSectionPage(false);
    openMyList();
    return false;
  }
  // Остальные — заглушка
  showToast(`🚧 ${el.textContent.trim()} — coming soon`);
  return false;
}

          </button>
        </div>
      </div>

  // ═══════════════════════════════════════════════════════════
  //  3. CHANNELS / STUDIOS
  // ═══════════════════════════════════════════════════════════
  if (cfg.channelsType && cfg.channelsType !== 'none') {
    const channelsDivider = document.createElement('div');
    channelsDivider.className = 'section-divider';
    channelsDivider.textContent = cfg.channelsLabel || 'Browse By';
    rowsEl.appendChild(channelsDivider);

    const channelsWrap = document.createElement('div');
    channelsWrap.className = 'channels-scroll-wrap';
    const channelsRow = document.createElement('div');
    channelsRow.className = 'channels-row';
    channelsRow.id = `section-channels-${type}`;
    channelsWrap.appendChild(channelsRow);
    rowsEl.appendChild(channelsWrap);
  }

  // ═══════════════════════════════════════════════════════════
  //  4. CONTINUE WATCHING
  // ═══════════════════════════════════════════════════════════
  if (cfg.showContinue) {
    const continueRow = document.createElement('div');
    continueRow.className = 'row';
    continueRow.innerHTML = `
      <div class="row-header">
        <span class="row-title">Continue Watching</span>
        <a class="row-link">See all →</a>
      </div>
      <div class="row-scroll-wrap">
        <div class="cards-track track-wide" id="section-continue-${type}"></div>
      </div>
    `;
    rowsEl.appendChild(continueRow);
    renderSkeletons(`section-continue-${type}`, 5, 'wide', 'md');
  }

  // ═══════════════════════════════════════════════════════════
  //  5. EXISTING CURATED ROWS
  // ═══════════════════════════════════════════════════════════

  // Выбираем случайные подборки
  let curatedPool = [];
  if (Array.isArray(cfg.curatedPool)) {
    cfg.curatedPool.forEach(poolKey => {
      if (SECTION_CURATED[poolKey]) curatedPool.push(...SECTION_CURATED[poolKey]);
    });
  } else if (cfg.curatedPool && SECTION_CURATED[cfg.curatedPool]) {
    curatedPool = [...SECTION_CURATED[cfg.curatedPool]];
  }

  const picked = [];
  const pool = [...curatedPool];
  for (let i = 0; i < cfg.curatedCount && pool.length; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(idx, 1)[0]);
  }

  // Determine media type for curated rows
  const curatedMedia = cfg.media === 'both' ? 'movie' : cfg.media;

  const rowDefs = [
    ...cfg.fixed.map(f => ({ title: f.title, endpoint: f.endpoint, params: f.params, media: f.endpoint.includes('/tv') ? 'tv' : 'movie' })),
    ...picked.map(c => ({
      title:    c.title,
      endpoint: c.params.with_origin_country === 'JP' && c.params.with_genres?.includes('16')
        ? (c.params.with_genres?.includes('10759') || c.params.with_genres?.includes('18') || c.params.with_genres?.includes('35') || c.params.with_genres?.includes('9648') || c.params.with_genres?.includes('10765')
          ? `/discover/tv` : `/discover/${curatedMedia}`)
        : `/discover/${curatedMedia}`,
      params:   c.params,
      media:    curatedMedia,
    })),
  ];

  // Fix media detection for each rowDef
  rowDefs.forEach(def => {
    if (!def.media) {
      def.media = def.endpoint.includes('/tv') ? 'tv' : 'movie';
    }
  });

  // Скелетоны
  rowDefs.forEach((def, i) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'row';
    rowEl.id = `section-row-${i}`;
    rowEl.innerHTML = `
      <div class="row-header">
        <span class="row-title">${def.title}</span>
        <a class="row-link" id="section-seeall-${i}">See all →</a>
      </div>
      <div class="row-scroll-wrap">
        <div class="cards-track track-poster" id="section-track-${i}"></div>
      </div>

    rowsEl.appendChild(rowEl);
    const capturedDef = def;
    rowEl.querySelector(`#section-seeall-${i}`).onclick =
      () => openBrowsePage(capturedDef.title, capturedDef.endpoint, capturedDef.params, capturedDef.media);
    renderSkeletons(`section-track-${i}`, 8, 'poster', 'md');
  });

  // ═══════════════════════════════════════════════════════════
  //  LOAD DATA
  // ═══════════════════════════════════════════════════════════

  // Hero slider data
  const heroPromise = tmdb(cfg.heroEndpoint, cfg.heroParams).then(data => {
    const results = (data.results || []).filter(i => i.backdrop_path && i.overview).slice(0, 5);
    if (results.length) {
      // Assign media_type
      results.forEach(item => {
        if (!item.media_type) {
          item.media_type = cfg.heroEndpoint.includes('/tv') || cfg.heroEndpoint.includes('/tv') ? 'tv' :
            (item.name ? 'tv' : 'movie');
        }
      });
      initSectionHeroSlider(results);
    }
  }).catch(() => {});

  // Channels — lazy load when scrolled into view
  const channelContainerId = `section-channels-${type}`;
  if (cfg.channelsType === 'networks') {
    lazyRow(channelContainerId, () => renderSectionChannels(STREAMING_NETWORKS, 'network', channelContainerId));
  } else if (cfg.channelsType === 'studios') {
    lazyRow(channelContainerId, () => renderSectionChannels(PRODUCTION_STUDIOS, 'studio', channelContainerId));
  }

  // Continue watching (mock data from trending)
  if (cfg.showContinue) {
    const continueEndpoint = cfg.media === 'tv' || cfg.media === 'both'
      ? '/trending/tv/week' : '/trending/movie/week';
    tmdb(continueEndpoint).then(data => {
      const items = (data.results || []).slice(0, 5);
      const progresses     = [68, 32, 85, 47, 21];
      const progressLabels = ['24m left', '42m left', '8m left', '35m left', '52m left'];
      items.forEach(item => {
        if (!item.media_type) item.media_type = continueEndpoint.includes('/tv') ? 'tv' : 'movie';
      });
      populateRow(`section-continue-${type}`, items, 'wide', 'md', item => {
        const idx = items.indexOf(item);
        return { progress: progresses[idx] ?? 50, progressLabel: progressLabels[idx] ?? '' };
      });
    }).catch(() => {});
  }

  // Curated rows data
  const results = await Promise.allSettled(
    rowDefs.map(def => tmdb(def.endpoint, def.params))
  );

  results.forEach((res, i) => {
    const trackEl = document.getElementById(`section-track-${i}`);
    if (!trackEl) return;
    if (res.status !== 'fulfilled' || !(res.value.results || []).length) {
      const rowEl = document.getElementById(`section-row-${i}`);
      if (rowEl) rowEl.style.display = 'none';
      return;
    }
    const mediaType = rowDefs[i].media || (rowDefs[i].endpoint.includes('/tv') ? 'tv' : 'movie');
    const items = (res.value.results || []).map(item => ({
      ...item,
      media_type: item.media_type || mediaType,
    }));
    populateRow(`section-track-${i}`, items.slice(0, 20), 'poster', 'md');
  });
}

// ─── SECTION HERO SLIDER (independent from main hero) ─────
let sectionHeroItems = [];
let sectionHeroIndex = 0;
let sectionHeroTimer = null;

function initSectionHeroSlider(items) {
  // Cleanup previous
  clearInterval(sectionHeroTimer);
  sectionHeroItems = items;
  sectionHeroIndex = 0;

  const track = document.getElementById('section-hero-slides');
  const dots  = document.getElementById('section-hero-dots');
  if (!track || !dots) return;

  track.innerHTML = '';
  dots.innerHTML  = '';

  items.forEach((item, i) => {
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    const heroImgSize = IS_TV_DEVICE ? 'w1280' : 'original';
    const backdrop = item.backdrop_path ? `${IMG_BASE}/${heroImgSize}${item.backdrop_path}` : '';
    slide.innerHTML = `<div class="hero-slide-bg" style="background-image:url('${backdrop}')"></div>`;
    track.appendChild(slide);

    const dot = document.createElement('div');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToSectionSlide(i);
    dots.appendChild(dot);
  });

  updateSectionHeroContent(items[0], false);

  document.getElementById('section-hero-prev').onclick = () => goToSectionSlide(sectionHeroIndex - 1);
  document.getElementById('section-hero-next').onclick = () => goToSectionSlide(sectionHeroIndex + 1);

  // Swipe
  const area = document.getElementById('section-hero-area');
  let touchX = 0;
  area.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; }, { passive: true });
  area.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 50) dx < 0 ? goToSectionSlide(sectionHeroIndex + 1) : goToSectionSlide(sectionHeroIndex - 1);
  });

  startSectionAutoplay();
  preloadImages(items.map(i => i.backdrop_path ? `${IMG_BASE}/original${i.backdrop_path}` : null));
}

function updateSectionHeroContent(item, animate = true) {
  const content = document.getElementById('section-hero-content');
  if (animate) content.classList.add('transitioning');

  const title   = item.title || item.name || 'Untitled';
  const year    = (item.release_date || item.first_air_date || '').slice(0, 4);
  const rating  = item.vote_average ? item.vote_average.toFixed(1) : '';
  const isTV    = item.media_type === 'tv' || !!item.name;
  const genres  = (item.genre_ids || []).slice(0, 3).map(id => GENRE_MAP[id]).filter(Boolean).join(', ');
  const overview = item.overview || '';
  const label   = getContentLabel(item);

  setTimeout(() => {
    document.getElementById('section-hero-tag').textContent = label;
    const words = title.split(' ');
    document.getElementById('section-hero-title').innerHTML = words.length <= 2
      ? `<span class="highlight">${title}</span>`
      : words.slice(0, 2).join(' ') + ' <span class="highlight">' + words.slice(2).join(' ') + '</span>';
    document.getElementById('section-hero-meta').innerHTML = `
      ${rating ? `<span class="rating">★ ${rating}</span><span class="dot-sep"></span>` : ''}
      <span>${year}</span><span class="dot-sep"></span><span>${isTV ? 'Series' : 'Movie'}</span>
      ${genres ? `<span class="dot-sep"></span><span>${genres}</span>` : ''}
    `;
    document.getElementById('section-hero-desc').textContent =
      overview.length > 200 ? overview.slice(0, 200) + '…' : overview;
    document.getElementById('section-hero-play').onclick = () => showToast('▶ Playing ' + title);
    document.getElementById('section-hero-info').onclick = () => openModal(item);
    if (animate) content.classList.remove('transitioning');
  }, animate ? 220 : 0);
}

let sectionHeroTransitioning = false;

function goToSectionSlide(newIndex) {
  if (sectionHeroTransitioning || newIndex === sectionHeroIndex) return;
  sectionHeroTransitioning = true;

  const total = sectionHeroItems.length;
  if (newIndex < 0) newIndex = total - 1;
  if (newIndex >= total) newIndex = 0;

  sectionHeroIndex = newIndex;

  const track  = document.getElementById('section-hero-slides');
  const dots   = document.getElementById('section-hero-dots');
  if (track) {
    track.style.transform = `translateX(-${newIndex * 100}%)`;
    track.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === newIndex));
  }
  if (dots) {
    dots.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === newIndex));
  }

  updateSectionHeroContent(sectionHeroItems[newIndex], true);
  setTimeout(() => { sectionHeroTransitioning = false; }, 750);
  startSectionAutoplay();
}

function startSectionAutoplay() {
  clearInterval(sectionHeroTimer);
  const bar = document.getElementById('section-hero-progress');
  if (bar) {
    bar.style.transition = 'none';
    bar.style.width = '0%';
    bar.getBoundingClientRect();
    bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
    bar.style.width = '100%';
  }
  sectionHeroTimer = setInterval(() => goToSectionSlide(sectionHeroIndex + 1), SLIDE_DURATION);
}

// ─── RENDER CHANNELS FOR SECTION PAGES ──────────────────────
async function renderSectionChannels(list, type, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;

  const isNetwork = (type === 'network');
  const results = await Promise.allSettled(
    list.map(item => {
      const primaryId = item.ids.split('|')[0];
      const infoEndpoint = isNetwork ? `/network/${primaryId}` : `/company/${primaryId}`;
      const discoverEndpoint = isNetwork ? '/discover/tv' : '/discover/movie';
      const filterKey = isNetwork ? 'with_networks' : 'with_companies';
      return Promise.all([
        tmdb(infoEndpoint),
        tmdb(discoverEndpoint, { [filterKey]: item.ids, sort_by: 'popularity.desc' }),
      ]).then(([info, discover]) => ({ item, info, discover }));
    })
  );

  el.innerHTML = '';
  results.forEach(res => {
    if (res.status !== 'fulfilled') return;
    const { item, info, discover } = res.value;
    const count    = discover.total_results || 0;
    const subtitle = count ? `${count.toLocaleString()} titles` : 'Browse';
    const logoPath = info?.logos?.[0]?.file_path || info?.logo_path || null;
    const logoUrl  = logoPath ? `${IMG_BASE}/w92${logoPath}` : null;

    const chip = buildChip(item.name, logoUrl, subtitle, () => {
      openDetailPage({

let _browse = {
  endpoint: '',
  params:   {},
  media:    'movie',
  page:     1,
  total:    0,
};

async function openBrowsePage(title, endpoint, params, media) {
  _browse = { endpoint, params: { ...params }, media, page: 1, total: 0 };

  document.getElementById('browse-title').textContent = title;
  document.getElementById('browse-count').textContent = '';
  document.getElementById('browse-grid').innerHTML    = '';

  const btn = document.getElementById('browse-load-btn');
  btn.disabled    = false;
  btn.textContent = 'Load More';

  document.getElementById('browse-page').scrollTop = 0;
  document.getElementById('browse-page').classList.add('open');

  await _browseFetch();
}

async function _browseFetch() {
  const btn  = document.getElementById('browse-load-btn');
  const grid = document.getElementById('browse-grid');

  btn.disabled    = true;
  btn.textContent = 'Loading…';

  // Скелетоны первой страницы
  if (_browse.page === 1) {
    for (let i = 0; i < 20; i++) {
      const sk = document.createElement('div');
      sk.className = 'card card-poster-md skeleton-card';
      sk.innerHTML = '<div class="card-poster" style="aspect-ratio:2/3"><div class="skeleton-shimmer"></div></div>';
      sk.id = `browse-skel-${i}`;
      grid.appendChild(sk);
    }
  }

  try {
    const data = await tmdb(_browse.endpoint, {
      ..._browse.params,
      page: _browse.page,
    });

    // Убираем скелетоны первой страницы
    grid.querySelectorAll('.skeleton-card').forEach(s => s.remove());

    const results = data.results || [];
    _browse.total = data.total_results || 0;

    results.forEach(item => {
      grid.appendChild(buildCard({ ...item, media_type: _browse.media }, 'poster', 'md'));
    });

    const loaded = grid.querySelectorAll('.card:not(.skeleton-card)').length;
    document.getElementById('browse-count').textContent =
      `${loaded.toLocaleString()} of ${_browse.total.toLocaleString()}`;

    const hasMore = _browse.page < (data.total_pages || 1) && _browse.page < 20; // TMDB max 500 pages but we cap at 20
    btn.disabled    = !hasMore;
    btn.textContent = hasMore ? 'Load More' : 'No more results';
    if (hasMore) _browse.page++;

  } catch (err) {
    grid.querySelectorAll('.skeleton-card').forEach(s => s.remove());
    btn.disabled    = false;
    btn.textContent = 'Retry';
    console.error('Browse fetch error:', err);
  }
}

function browseLoadMore() {
  _browseFetch();
}

function closeBrowsePage() {
  document.getElementById('browse-page').classList.remove('open');
}

function closeDetailPage() {
  document.getElementById('detail-page').classList.remove('open');
}

// ═══════════════════════════════════════════════════════════
//  TMDB FETCH  +  двухуровневый кеш (Map + sessionStorage)
// ═══════════════════════════════════════════════════════════

// L1: in-memory Map (мгновенный доступ, дедупликация параллельных запросов)
// L2: sessionStorage (переживает переключение разделов, умирает с табом)
const _tmdbCache = new Map();
const TMDB_CACHE_TTL = 10 * 60 * 1000; // 10 минут

function _ssGet(key) {
  try {
    const raw = sessionStorage.getItem('tmdb:' + key);
    if (!raw) return null;
    const { data, ts } = JSON.parse(raw);
    if (Date.now() - ts > TMDB_CACHE_TTL) {
      sessionStorage.removeItem('tmdb:' + key);
      return null;
    }
    return data;
  } catch { return null; }
}

function _ssSet(key, data) {
  try {
    sessionStorage.setItem('tmdb:' + key, JSON.stringify({ data, ts: Date.now() }));
  } catch {
    // sessionStorage full — clear old entries
    try {
      const toRemove = [];
      for (let i = 0; i < sessionStorage.length; i++) {
        const k = sessionStorage.key(i);
        if (k && k.startsWith('tmdb:')) toRemove.push(k);
      }
      // Remove oldest half
      toRemove.slice(0, Math.ceil(toRemove.length / 2)).forEach(k => sessionStorage.removeItem(k));
      sessionStorage.setItem('tmdb:' + key, JSON.stringify({ data, ts: Date.now() }));
    } catch { /* give up */ }
  }
}

async function tmdb(path, params = {}) {
  const url = new URL(TMDB_BASE + path);
  url.searchParams.set('api_key', TMDB_KEY);
  url.searchParams.set('language', 'en-US');
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const key = url.toString();

  // L1: in-memory (includes in-flight promises)
  if (_tmdbCache.has(key)) return _tmdbCache.get(key);

  // L2: sessionStorage (resolved data only)
  const cached = _ssGet(key);
  if (cached) {
    const resolved = Promise.resolve(cached);
    _tmdbCache.set(key, resolved);
    return resolved;
  }

  // Network fetch
  const promise = fetch(url)
    .then(r => {
      if (!r.ok) throw new Error('TMDB ' + r.status + ': ' + path);
      return r.json();
    })
    .then(data => {
      _ssSet(key, data); // persist to L2
      return data;
    })
    .catch(err => {
      _tmdbCache.delete(key); // при ошибке не кешируем — дадим повторить
      throw err;
    });

  _tmdbCache.set(key, promise);
  return promise;
}

// ─── BUILD CARD ───
// Item data store for event delegation
const _cardItems = new Map(); // itemId → item object

function buildCard(item, type = 'poster', size = 'md', opts = {}) {
  const card    = document.createElement('div');
  card.className = `card card-${type}-${size}`;
  card.dataset.itemId = item.id;

  // Store item data for delegation lookup
  _cardItems.set(String(item.id), item);

  const isTV   = item.media_type === 'tv' || !!item.name;
  const title  = item.title || item.name || 'Untitled';
  const year   = (item.release_date || item.first_air_date || '').slice(0, 4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : null;
  const genres = (item.genre_ids || []).slice(0, 2).map(id => GENRE_MAP[id]).filter(Boolean).join(' · ');

  let imgPath = null;
  if (type === 'wide') {
    imgPath = item.backdrop_path
      ? `${IMG_BASE}/w780${item.backdrop_path}`
      : (item.poster_path ? `${IMG_BASE}/w500${item.poster_path}` : null);
  } else {
    imgPath = item.poster_path
      ? `${IMG_BASE}/w500${item.poster_path}`
      : (item.backdrop_path ? `${IMG_BASE}/w780${item.backdrop_path}` : null);
  }

  const badgeHTML = opts.badge
    ? `<div class="card-badge">${opts.badge}</div>` : '';
  const ratingHTML = rating
    ? `<div class="card-rating">\u2605 ${rating}</div>` : '';
  const progressHTML = opts.progress !== undefined ? `
    <div class="progress-bar"><div class="progress-fill" style="width:${opts.progress}%"></div></div>
    ${opts.progressLabel ? `<div class="card-progress-label">${opts.progressLabel}</div>` : ''}
  ` : '';

  const inList = myListHas(item.id);

  card.innerHTML = `
    <div class="card-poster">
      ${imgPath
        ? `<img src="${imgPath}" alt="${title.replace(/"/g,"")}" loading="lazy" decoding="async"
               style="width:100%;height:100%;object-fit:cover;display:block;">`
        : `<div class="card-art-fallback"><span>${title}</span></div>`}
      ${badgeHTML}
      ${ratingHTML}
      <div class="card-overlay">
        <div class="card-play"></div>
        <div class="card-name">${title}</div>
        <div class="card-sub">${year}${genres ? ' · ' + genres : ''}</div>
      </div>
    </div>
    ${progressHTML}
  `;

  if (inList) _attachRemoveBtn(card, item);

  // No per-card event handlers — handled by delegation
  return card;
}

// Создаёт и вешает кнопку ♥ на карточку
function _attachRemoveBtn(card, item) {
  const poster = card.querySelector('.card-poster');
  if (!poster || poster.querySelector('.mylist-remove-btn')) return;
  const btn = document.createElement('button');
  btn.className = 'mylist-remove-btn';
  btn.title = 'Remove from My List';
  btn.innerHTML = '♥';
  btn.addEventListener('click', e => {
    e.stopPropagation();
    myListToggle(item);
    showToast('✕ Removed from My List');
    syncCardListState(item.id, false);
    if (document.getElementById('mylist-page').classList.contains('open')) renderMyList();
  });
  poster.appendChild(btn);
}

// Синхронизирует все карточки в DOM после toggle
function syncCardListState(itemId, added) {
  document.querySelectorAll(`.card[data-item-id="${itemId}"]`).forEach(card => {
    if (added) {
      // Нужно передать item — берём из mylist storage
      const item = myListGet().find(i => i.id === itemId);
      if (item) _attachRemoveBtn(card, item);
    } else {
      const btn = card.querySelector('.mylist-remove-btn');
      if (btn) btn.remove();
    }
  });
}

// ─── POPULATE ROW ───────────────────────────────────────────
// v2: на TV рендерим сначала 8 карточек (то что видно на экране),
// остальные добавляем через requestIdleCallback — main thread
// освобождается быстрее, первая отрисовка не блокируется.
const TV_FIRST_BATCH = 8; // карточек в первой порции

function populateRow(id, items, type = 'poster', size = 'md', optsFn = () => ({})) {
  const el = document.getElementById(id);
  if (!el) return;
  el.innerHTML = '';

  if (!IS_TV_DEVICE || items.length <= TV_FIRST_BATCH) {
    // Десктоп или маленький набор — рендерим всё сразу
    items.forEach(item => el.appendChild(buildCard(item, type, size, optsFn(item))));
    return;
  }

  // TV: первый батч — синхронно (чтобы строка не выглядела пустой)
  items.slice(0, TV_FIRST_BATCH).forEach(
    item => el.appendChild(buildCard(item, type, size, optsFn(item)))
  );

  // Оставшиеся карточки — в idle time, порциями по 4
  // Используем requestIdleCallback если есть, иначе setTimeout(0)
  const rest = items.slice(TV_FIRST_BATCH);
  const CHUNK = 4;
  let idx = 0;

  function scheduleChunk() {
    if (idx >= rest.length) return;
    const schedule = typeof requestIdleCallback !== 'undefined'
      ? cb => requestIdleCallback(cb, { timeout: 500 })
      : cb => setTimeout(cb, 0);

    schedule(deadline => {
      // Рендерим пока есть idle-time или хотя бы один элемент
      const limit = idx + CHUNK;
      while (idx < limit && idx < rest.length) {
        el.appendChild(buildCard(rest[idx], type, size, optsFn(rest[idx])));
        idx++;
      }
      scheduleChunk(); // планируем следующий батч
    });
  }

  scheduleChunk();
}

// ─── LAZY ROW LOADER (Intersection Observer) ────────────────
// v2: на TV rootMargin увеличен до 400px — начинаем грузить
// заранее, т.к. Android TV медленнее реагирует на скролл.
function lazyRow(trackId, loader) {
  const track = document.getElementById(trackId);
  if (!track) return;

  const sentinel = track.closest('.row') || track.closest('.channels-scroll-wrap') || track;
  // TV грузит чуть раньше чтобы скрыть задержку медленного сети/CPU
  const margin = IS_TV_DEVICE ? '400px 0px' : '200px 0px';

  const obs = new IntersectionObserver(
    (entries, o) => {
      if (entries[0].isIntersecting) {
        o.disconnect();
        loader().catch(err => console.warn('lazyRow error:', trackId, err));
      }
    },
    { rootMargin: margin }
  );

  obs.observe(sentinel);
}

// ─── IMAGE PRELOADER ────────────────────────────────────────
// Предзагружает изображения заранее (hero-слайды, следующий слайд)
function preloadImages(urls) {
  urls.forEach(url => {
    if (!url) return;
    const img = new Image();
    img.src = url;
  });

// ─── HERO ───
// ═══════════════════════════════════════════════════════════
//  HERO SLIDER
// ═══════════════════════════════════════════════════════════
const SLIDE_DURATION = 7000; // ms между автосменами
let heroItems  = [];
let heroIndex  = 0;
let heroTimer  = null;
let heroProgressTimer = null;
let isTransitioning = false;

// Лейблы по типу контента
function getContentLabel(item) {
  const genres = item.genre_ids || [];
  const isTV   = item.media_type === 'tv' || !!item.name;
  // Аниме: жанр 16 (Animation) + происхождение Япония или keyword
  const isAnim = genres.includes(16);
  // Примерные genre_ids: Animation=16, Action=28, etc.
  if (isAnim && isTV)  return 'Anime Series';
  if (isAnim && !isTV) return 'Anime Film';
  if (!isTV)           return 'Film';
  return 'Series';
}

function buildHeroSlides(items) {
  const track = document.getElementById('hero-slides');
  const dots   = document.getElementById('hero-dots');
  track.innerHTML = '';
  dots.innerHTML  = '';

  items.forEach((item, i) => {
    // Слайд
    const slide = document.createElement('div');
    slide.className = 'hero-slide' + (i === 0 ? ' active' : '');
    // TV: w1280 вместо original — быстрее загружается, незаметно на 1080p
    const heroImgSize = IS_TV_DEVICE ? 'w1280' : 'original';
    const backdrop = item.backdrop_path
      ? `${IMG_BASE}/${heroImgSize}${item.backdrop_path}` : '';
    slide.innerHTML = `<div class="hero-slide-bg" style="background-image:url('${backdrop}')"></div>`;
    track.appendChild(slide);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });
}

function updateHeroContent(item, animate = true) {
  const content = document.getElementById('hero-content');
  if (animate) {
    content.classList.add('transitioning');
  }

  const title    = item.title || item.name || 'Untitled';
  const year     = (item.release_date || item.first_air_date || '').slice(0, 4);
  const rating   = item.vote_average ? item.vote_average.toFixed(1) : '';
  const isTV     = item.media_type === 'tv' || !!item.name;
  const genres   = (item.genre_ids || []).slice(0, 3).map(id => GENRE_MAP[id]).filter(Boolean).join(', ');
  const overview = item.overview || '';
  const label    = getContentLabel(item);

  setTimeout(() => {
    // Tag
    document.getElementById('hero-tag-text').textContent = label;

    // Title — первые 2 слова обычным цветом, остальные акцентом
    const words = title.split(' ');
    document.getElementById('hero-title').innerHTML = words.length <= 2
      ? `<span class="highlight">${title}</span>`
      : words.slice(0, 2).join(' ') + ' <span class="highlight">' + words.slice(2).join(' ') + '</span>';

    // Meta
    document.getElementById('hero-meta').innerHTML = `
      ${rating ? `<span class="rating">★ ${rating}</span><span class="dot-sep"></span>` : ''}
      <span>${year}</span>
      <span class="dot-sep"></span>
      <span>${isTV ? 'Series' : 'Movie'}</span>
      ${genres ? `<span class="dot-sep"></span><span>${genres}</span>` : ''}
    `;

    // Desc
    document.getElementById('hero-desc').textContent =
      overview.length > 200 ? overview.slice(0, 200) + '…' : overview;

    // Buttons
    document.getElementById('hero-play-label').textContent = 'Play';
    document.getElementById('hero-play-btn').onclick = () => showToast('▶ Playing ' + title);
    document.getElementById('hero-info-btn').onclick = () => openModal(item);

    if (animate) {
      content.classList.remove('transitioning');
    }
  }, animate ? 220 : 0);
}

function updateSlideVisuals(newIndex) {
  const track  = document.getElementById('hero-slides');
  const dots   = document.getElementById('hero-dots');
  const slides = track.querySelectorAll('.hero-slide');
  const dotEls = dots.querySelectorAll('.hero-dot');

  // Сдвигаем трек
  track.style.transform = `translateX(-${newIndex * 100}%)`;

  // Обновляем active классы
  slides.forEach((s, i) => s.classList.toggle('active', i === newIndex));
  dotEls.forEach((d, i) => d.classList.toggle('active', i === newIndex));
}

function goToSlide(newIndex, direction = null) {
  if (isTransitioning || newIndex === heroIndex) return;
  isTransitioning = true;

  // Бесконечность: wrapping
  const total = heroItems.length;
  if (newIndex < 0)      newIndex = total - 1;
  if (newIndex >= total) newIndex = 0;

  heroIndex = newIndex;
  updateSlideVisuals(heroIndex);
  updateHeroContent(heroItems[heroIndex], true);

  setTimeout(() => { isTransitioning = false; }, 750);

  // Перезапускаем таймер
  resetAutoplay();
}

function nextSlide() { goToSlide(heroIndex + 1); }
function prevSlide() { goToSlide(heroIndex - 1); }

// Прогресс-бар автосмены
function startProgressBar() {
  const bar = document.getElementById('hero-progress-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  // Форс reflow
  bar.getBoundingClientRect();
  bar.style.transition = `width ${SLIDE_DURATION}ms linear`;
  bar.style.width = '100%';
}

function resetAutoplay() {
  clearInterval(heroTimer);
  startProgressBar();
  heroTimer = setInterval(nextSlide, SLIDE_DURATION);
}

function initHeroSlider(items) {
  heroItems = items;
  heroIndex = 0;

  buildHeroSlides(items);
  updateHeroContent(items[0], false);

  // Кнопки стрелок
  document.getElementById('hero-prev').onclick = prevSlide;
  document.getElementById('hero-next').onclick = nextSlide;

  // Свайп / колесо мыши
  const section = document.getElementById('hero-section');
  let touchStartX = 0;
  section.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  section.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) dx < 0 ? nextSlide() : prevSlide();
  });

  // Горизонтальный скролл мышью в области hero переключает слайд
  section.addEventListener('wheel', e => {
    if (Math.abs(e.deltaX) > Math.abs(e.deltaY)) {
      e.preventDefault();
      e.deltaX > 30 ? nextSlide() : e.deltaX < -30 ? prevSlide() : null;
    }
  }, { passive: false });

  resetAutoplay();
}

// Добавляет слайды в уже запущенный hero (вызывается после ленивой загрузки)
function appendHeroSlides(items) {
  if (!items || !items.length) return;
  const track = document.getElementById('hero-slides');
  const dots  = document.getElementById('hero-dots');
  if (!track || !dots) return;

  items.forEach(item => {
    heroItems.push(item);
    const idx = heroItems.length - 1;

    // Слайд
    const heroImgSize = IS_TV_DEVICE ? 'w1280' : 'original';
    const bg = item.backdrop_path ? `${IMG_BASE}/${heroImgSize}${item.backdrop_path}` : '';
    const slide = document.createElement('div');
    slide.className = 'hero-slide';
    slide.innerHTML = `<div class="hero-slide-bg" style="background-image:url('${bg}')"></div>`;
    track.appendChild(slide);

    // Точка
    const dot = document.createElement('button');
    dot.className = 'hero-dot';
    dot.setAttribute('aria-label', `Slide ${idx + 1}`);
    dot.onclick = () => goToSlide(idx);
    dots.appendChild(dot);
  });
}

    <div class="channel-info">
      <div class="channel-name">${name}</div>
      <div class="channel-count">${subtitle}</div>
    </div>
  `;
  return chip;
}

// ─── RENDER NETWORKS ROW ───
async function renderNetworks() {
  const el = document.getElementById('channels-networks');
  if (!el) return;

  // Для каждой сети запрашиваем логотип через /network/{id} и кол-во тайтлов через /discover/tv
  const results = await Promise.allSettled(
    STREAMING_NETWORKS.map(n => {
      const primaryId = n.ids.split('|')[0]; // берём первый ID для логотипа
      return Promise.all([
        tmdb(`/network/${primaryId}`),
        tmdb('/discover/tv', { with_networks: n.ids, sort_by: 'popularity.desc' }),
      ]).then(([networkInfo, discover]) => ({ network: n, networkInfo, discover }));
    })
  );

  el.innerHTML = '';
  results.forEach(res => {
    if (res.status !== 'fulfilled') return;
    const { network, networkInfo, discover } = res.value;
    const count    = discover.total_results || 0;
    const subtitle = count ? `${count.toLocaleString()} titles` : 'Browse';
    const logoPath = networkInfo?.logos?.[0]?.file_path || networkInfo?.logo_path || null;
    const logoUrl  = logoPath ? `${IMG_BASE}/w92${logoPath}` : null;

    const chip = buildChip(network.name, logoUrl, subtitle, () => {
      openDetailPage({
        name:      network.name,
        logoUrl:   logoUrl,
        location:  networkInfo?.headquarters || networkInfo?.origin_country || '',
        type:      'network',
        ids:       network.ids,
        primaryId: network.ids.split('|')[0],
      });
    });
    el.appendChild(chip);
  });
}

// ─── RENDER STUDIOS ROW ───
async function renderStudios() {
  const el = document.getElementById('channels-studios');
  if (!el) return;

  const results = await Promise.allSettled(
    PRODUCTION_STUDIOS.map(s => {
      const primaryId = s.ids.split('|')[0];
      return Promise.all([
        tmdb(`/company/${primaryId}`),
        tmdb('/discover/movie', { with_companies: s.ids, sort_by: 'popularity.desc' }),
      ]).then(([companyInfo, discover]) => ({ studio: s, companyInfo, discover }));
    })
  );

  el.innerHTML = '';
  results.forEach(res => {
    if (res.status !== 'fulfilled') return;
    const { studio, companyInfo, discover } = res.value;
    const count    = discover.total_results || 0;
    const subtitle = count ? `${count.toLocaleString()} movies` : 'Browse';
    const logoPath = companyInfo?.logo_path || null;
    const logoUrl  = logoPath ? `${IMG_BASE}/w92${logoPath}` : null;

    const chip = buildChip(studio.name, logoUrl, subtitle, () => {
      openDetailPage({
        name:      studio.name,
        logoUrl:   logoUrl,
        location:  [companyInfo?.headquarters, companyInfo?.origin_country].filter(Boolean).join(' · ') || '',
        type:      'studio',
        ids:       studio.ids,
        primaryId: studio.ids.split('|')[0],
      });
    });
    el.appendChild(chip);
  });
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  // Скелетоны только для видимых при старте строк
  renderSkeletons('continue-row',  5, 'wide',   'md');
  renderSkeletons('originals-row', 8, 'poster', 'md');
  renderSkeletons('trending-row',  8, 'poster', 'sm');
  renderSkeletons('toprated-row',  8, 'poster', 'md');

  // Стриминги — lazy load when scrolled into view
  lazyRow('channels-networks', () => renderNetworks());
  lazyRow('channels-studios',  () => renderStudios());

  try {
    // ── Запросы выше fold (нужны сразу для hero + первых строк) ──
    const [
      trendingMovies,
      trendingTV,
      trendingAll,
      newMovies,
      newTV,
    ] = await Promise.all([
      tmdb('/discover/movie', { sort_by:'popularity.desc', without_genres:'16' }),
      tmdb('/discover/tv',    { sort_by:'popularity.desc', without_genres:'16' }),
      tmdb('/trending/all/week'),
      tmdb('/movie/now_playing'),
      tmdb('/tv/on_the_air'),
    ]);

    // ── Hero slider ──────────────────────────────────────────
    const heroSlides = [
      { ...((trendingMovies.results || []).find(i => i.backdrop_path && i.overview)), media_type: 'movie' },
      { ...((trendingTV.results     || []).find(i => i.backdrop_path && i.overview)), media_type: 'tv'    },
    ].filter(i => i && i.id);
    if (heroSlides.length > 0) initHeroSlider(heroSlides);

    // Предзагружаем backdrop следующих hero-слайдов пока юзер читает первый
    preloadImages(
      heroSlides.map(i => i.backdrop_path ? `${IMG_BASE}/original${i.backdrop_path}` : null)
    );

    // ── Continue watching (видно сразу) ─────────────────────
    const tvTrend = trendingTV.results || [];
    const progresses     = [68, 32, 85, 47, 21];
    const progressLabels = ['24m left', '42m left', '8m left', '35m left', '52m left'];
    populateRow('continue-row', tvTrend.slice(0, 5), 'wide', 'md', item => {
      const i = tvTrend.indexOf(item);
      return { progress: progresses[i] ?? 50, progressLabel: progressLabels[i] ?? '' };
    });

    // ── New Releases (видно сразу) ───────────────────────────
    const newMov = newMovies.results || [];
    const newSer = newTV.results     || [];
    const newMixed = [];
    const nm = newMov.filter(i => i.backdrop_path || i.poster_path);
    const ns = newSer.filter(i => i.backdrop_path || i.poster_path);
    for (let i = 0; newMixed.length < 20; i++) {
      if (nm[i]) newMixed.push({ ...nm[i], media_type: 'movie' });
      if (ns[i]) newMixed.push({ ...ns[i], media_type: 'tv'    });
      if (!nm[i] && !ns[i]) break;
    }
    populateRow('originals-row', newMixed.slice(0, 20), 'poster', 'md', item => ({
      badge: item.media_type === 'movie' ? 'NEW' : 'ON AIR',
    }));

    // ── Trending (сразу под fold — грузим тоже сразу) ────────
    const trending = trendingAll.results || [];
    populateRow('trending-row', trending.slice(0, 20), 'poster', 'sm');

    // ── Top Rated — ниже fold, грузим лениво ────────────────
    lazyRow('toprated-row', async () => {
      const [topRatedTV, topRatedMovies] = await Promise.all([
        tmdb('/tv/top_rated'),
        tmdb('/movie/top_rated'),
      ]);
      const topTV  = topRatedTV.results     || [];
      const topMov = topRatedMovies.results || [];
      const topMixed = [];
      for (let i = 0; topMixed.length < 20; i++) {
        if (topTV[i])  topMixed.push({ ...topTV[i],  media_type: 'tv'    });
        if (topMov[i]) topMixed.push({ ...topMov[i], media_type: 'movie' });
        if (!topTV[i] && !topMov[i]) break;
      }
      populateRow('toprated-row', topMixed.slice(0, 20), 'poster', 'md');
    });

    // ── Animation + Anime — ниже fold, грузим лениво ────────
    // (строки рендерятся в section-page, поэтому lazyRow на них не нужен,
    //  но hero-слайды из этих данных добавим через preload)
    Promise.all([
      tmdb('/discover/movie', { with_genres:'16', sort_by:'popularity.desc', without_keywords:'210024' }),
      tmdb('/discover/tv',    { with_genres:'16', sort_by:'popularity.desc', without_keywords:'210024' }),
      tmdb('/discover/movie', { with_genres:'16', with_origin_country:'JP', sort_by:'popularity.desc' }),
      tmdb('/discover/tv',    { with_genres:'16', with_origin_country:'JP', sort_by:'popularity.desc' }),
    ]).then(([animMovies, animTV, animeMovies, animeTV]) => {
      // Добиваем hero ещё 4 слайдами если они есть
      const extra = [
        { ...((animMovies.results  || []).find(i => i.backdrop_path && i.overview)), media_type: 'movie' },
        { ...((animTV.results      || []).find(i => i.backdrop_path && i.overview)), media_type: 'tv'    },
        { ...((animeMovies.results || []).find(i => i.backdrop_path && i.overview)), media_type: 'movie' },
        { ...((animeTV.results     || []).find(i => i.backdrop_path && i.overview)), media_type: 'tv'    },
      ].filter(i => i && i.id);

      if (extra.length) {
        appendHeroSlides(extra);
        preloadImages(extra.map(i => i.backdrop_path ? `${IMG_BASE}/original${i.backdrop_path}` : null));
      }
    }).catch(() => {}); // не критично

  } catch (err) {
    console.error('TMDB error:', err);
    showToast('⚠ Failed to load content. Check API key.');
  }
}

init().then(() => {
  // На TV-устройствах сразу активируем D-pad навигацию
  // после загрузки данных — чтобы первый элемент был уже в DOM
  if (IS_TV_DEVICE) {
    setTimeout(() => {
      TV.activate();
    }, 600);
  }
});
</script>
