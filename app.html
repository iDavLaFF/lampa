<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no">
<title>MAX — Stream TV & Movies</title>
<!-- DNS prefetch + preconnect для быстрого старта API-запросов -->
<link rel="preconnect" href="https://api.themoviedb.org">
<link rel="preconnect" href="https://image.tmdb.org">
<link rel="dns-prefetch" href="https://fonts.googleapis.com">
<link rel="dns-prefetch" href="https://fonts.gstatic.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131d;
    --surface2: #1c1c2e;
    --accent: #7b2fff;
    --accent2: #5c47ff;
    --accent-glow: rgba(123, 47, 255, 0.4);
    --text: #ffffff;
    --text-dim: rgba(255,255,255,0.6);
    --text-muted: rgba(255,255,255,0.35);
    --card-radius: 8px;
    --nav-h: 80px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', 'Arial', sans-serif;
    font-size: 18px;
    overflow-x: hidden;
    cursor: none;
    user-select: none;
  }

  /* Custom cursor for TV feel */
  #cursor {
    width: 20px; height: 20px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    position: fixed;
    top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    will-change: transform;
    transition: width 0.2s, height 0.2s, background 0.2s, margin 0.2s;
  }
  #cursor.big {
    width: 40px; height: 40px;
    background: var(--accent-glow);
    margin: -10px 0 0 -10px;
  }

  /* ─── NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--nav-h);
    display: flex;
    align-items: center;
    padding: 0 40px;
    z-index: 205;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98) 0%, transparent 100%);
    gap: 48px;
  }

  .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 36px;
    letter-spacing: 0.15em;
    color: #fff;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-right: 16px;
  }

  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
    flex: 1;
  }

  .nav-links li a {
    text-decoration: none;
    color: var(--text-dim);
    font-size: 17px;
    font-weight: 500;
    letter-spacing: 0.02em;
    transition: color 0.2s;
    padding: 8px 0;
    border-bottom: 2px solid transparent;
  }
  .nav-links li a:hover,
  .nav-links li.active a {
    color: #fff;
    border-bottom-color: var(--accent);
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-left: auto;
  }

  .nav-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.75);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .nav-icon:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1.5px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.8);
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
  }
  .avatar:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ─── HERO SLIDER ─── */
  .hero {
    position: relative;
    width: 100%;
    height: 85vh;
    min-height: 680px;
    overflow: hidden;
  }

  /* Slides track — горизонтальный */
  .hero-slides {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.7s cubic-bezier(0.77, 0, 0.18, 1);
    will-change: transform;
    z-index: 1;
  }

  .hero-slide {
    flex: 0 0 100%;
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .hero-slide-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center top;
    transition: transform 8s ease;
    transform: scale(1.05);
  }
  /* Лёгкий Ken Burns эффект на активном слайде */
  .hero-slide.active .hero-slide-bg {
    transform: scale(1.0);
  }

  /* Градиентная маска поверх фото */
  .hero-slide::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to right,  rgba(10,10,15,0.96) 0%, rgba(10,10,15,0.55) 45%, rgba(10,10,15,0.15) 75%, transparent 100%),
      linear-gradient(to top,    rgba(10,10,15,1.00) 0%, rgba(10,10,15,0.3)  30%, transparent 65%),
      linear-gradient(to bottom, rgba(10,10,15,0.6)  0%, transparent 20%);
    z-index: 2;
  }

  /* Общий persistent overlay (nav fade) */
  .hero-bg {
    position: absolute; inset: 0;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(10,10,15,0.35) 0%, transparent 18%);
  }

  /* Контент слайда */
  .hero-content {
    position: absolute;
    left: 40px;
    bottom: 110px;
    z-index: 10;
    max-width: 680px;
    /* анимация появления */
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .hero-content.transitioning {
    opacity: 0;
    transform: translateY(14px);
  }

  .hero-tag {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 4px;
    margin-bottom: 20px;
  }
  .hero-tag .dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; animation: blink 1.5s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(52px, 7vw, 92px);
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.01em;
    text-transform: uppercase;
    margin-bottom: 20px;
    text-shadow: 0 4px 40px rgba(0,0,0,0.8);
  }
  .hero-title .highlight {
    background: linear-gradient(135deg, #a855f7 0%, #7c3aed 50%, #4f46e5 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 500;
    flex-wrap: wrap;
  }
  .hero-meta .rating {
    background: rgba(255,255,255,0.12);
    padding: 3px 10px;
    border-radius: 4px;
    font-weight: 700;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 13px;
  }
  .dot-sep { width: 4px; height: 4px; background: var(--text-muted); border-radius: 50%; flex-shrink: 0; }

  .hero-desc {
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 36px;
    max-width: 520px;
    font-weight: 400;
  }

  .hero-actions { display: flex; gap: 16px; align-items: center; }

  .btn-play {
    display: flex; align-items: center; gap: 12px;
    background: #fff; color: #0a0a0f;
    font-size: 16px; font-weight: 700; letter-spacing: 0.04em;
    padding: 16px 36px; border-radius: 6px; border: none; cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .btn-play:hover { background: #e8e0ff; transform: scale(1.04); box-shadow: 0 8px 40px rgba(123,47,255,0.4); }
  .play-icon {
    width: 0; height: 0; border-style: solid;
    border-width: 8px 0 8px 14px;
    border-color: transparent transparent transparent #0a0a0f;
    margin-top: 1px;
  }

  .btn-info {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.12); color: #fff;
    font-size: 16px; font-weight: 600; padding: 16px 28px;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.2);
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
    backdrop-filter: blur(10px);
  }
  .btn-info:hover { background: rgba(123,47,255,0.3); border-color: var(--accent); }

  /* ─── HERO NAV (dots + arrows + progress) ─── */
  .hero-nav {
    position: absolute;
    bottom: 36px;
    right: 40px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .hero-arrow {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    backdrop-filter: blur(10px);
    flex-shrink: 0;
  }
  .hero-arrow:hover { background: var(--accent); border-color: var(--accent); transform: scale(1.1); }
  .hero-arrow:active { transform: scale(0.95); }

  .hero-dots {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .hero-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    cursor: pointer;
    transition: width 0.3s, background 0.3s, border-radius 0.3s;
    flex-shrink: 0;
  }
  .hero-dot.active {
    width: 28px;
    border-radius: 3px;
    background: #fff;
  }

  /* Прогресс-бар авто-смены */
  .hero-progress-wrap {
    width: 80px; height: 2px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }
  .hero-progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    width: 0%;
    transition: width linear;
  }

  /* ─── CONTENT ROWS ─── */
  .content-area {
    position: relative;
    z-index: 5;
    padding: 0 0 60px;
    margin-top: -40px;
  }

  .row { margin-bottom: 48px; }

  .row-header {
    display: flex;
    align-items: baseline;
    gap: 20px;
    margin-bottom: 24px;
    padding: 0 40px;
  }

  .row-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #fff;
  }

  .row-link {
    font-size: 13px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
    letter-spacing: 0.05em;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .row:hover .row-link { opacity: 1; }

  .row-scroll-wrap {
    overflow-x: auto;
    overflow-y: visible;
    scrollbar-width: none;
    padding-bottom: 24px;
    margin-bottom: -24px;
  }
  .row-scroll-wrap::-webkit-scrollbar { display: none; }

  /*
   * ─── TRACK TYPES ────────────────────────────────────────────────
   *
   *  .track-poster  — вертикальные постеры 2:3 (узкие и высокие)
   *                   при scale(1.07) вылезают ~32px вверх/вниз
   *                   → padding-top/bottom увеличен до 32px
   *
   *  .track-wide    — горизонтальные карточки 16:9 (широкие, низкие)
   *                   при scale(1.07) вылезают меньше по вертикали
   *                   → padding-top/bottom 20px достаточно
   *
   *  .track-square  — квадратные карточки 1:1 (каналы, жанры)
   *                   промежуточный вариант → padding 24px
   *
   *  Горизонтальный padding одинаков для всех — 40px,
   *  чтобы первая/последняя карточка выравнивалась с заголовками.
   * ────────────────────────────────────────────────────────────── */

  .cards-track {
    display: flex;
    gap: 20px;
    overflow: visible;
    width: max-content;
    scroll-behavior: smooth;
  }

  /* Постеры 2:3 — нужен запас по высоте */
  .track-poster {
    padding: 32px 40px;
  }

  /* Широкие 16:9 — меньше вылет по вертикали */
  .track-wide {
    padding: 20px 40px;
  }

  /* Квадратные — средний вариант */
  .track-square {
    padding: 24px 40px;
  }

  /* ─── CARD SIZES ─── */

  /* Poster 2:3 */
  .card-poster-sm { width: 180px; }
  .card-poster-md { width: 240px; }
  .card-poster-lg { width: 320px; }

  /* Wide 16:9 */
  .card-wide-sm { width: 320px; }
  .card-wide-md { width: 420px; }
  .card-wide-lg { width: 560px; }

  /* Square 1:1 */
  .card-square-sm { width: 160px; }
  .card-square-md { width: 220px; }

  /* Aspect ratio per type */
  .card-poster-sm .card-poster,
  .card-poster-md .card-poster,
  .card-poster-lg .card-poster { aspect-ratio: 2/3; }

  .card-wide-sm .card-poster,
  .card-wide-md .card-poster,
  .card-wide-lg .card-poster { aspect-ratio: 16/9; }

  .card-square-sm .card-poster,
  .card-square-md .card-poster { aspect-ratio: 1/1; }

  /* Legacy aliases — оставим для совместимости */
  .card-sm { width: 200px; }
  .card-md { width: 270px; }
  .card-lg { width: 360px; }
  .card-wide .card-poster { aspect-ratio: 16/9; }
  .card-wide.card-md { width: 400px; }
  .card-wide.card-lg { width: 540px; }
  .card {
    flex: 0 0 auto;
    border-radius: var(--card-radius);
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), box-shadow 0.3s;
    background: var(--surface);
  }
  .card:hover {
    transform: scale(1.07) translateY(-8px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 2px var(--accent);
    z-index: 10;
  }

  .card-poster {
    width: 100%;
    aspect-ratio: 2/3;
    position: relative;
    overflow: hidden;
  }

  /* Procedural poster art */
  .card-art {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
  }

  .card-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px 14px 14px;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .card:hover .card-overlay { opacity: 1; }

  .card-play {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 8px;
  }
  .card-play::after {
    content: '';
    width: 0; height: 0;
    border-style: solid;
    border-width: 7px 0 7px 12px;
    border-color: transparent transparent transparent #0a0a0f;
    margin-left: 2px;
  }

  .card-name {
    font-size: 13px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .card-badge {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 3px;
    text-transform: uppercase;
  }

  /* Card sizes */
  .card-sm { width: 200px; }
  .card-md { width: 270px; }
  .card-lg { width: 360px; }

  /* Wide card (16:9) */
  .card-wide .card-poster { aspect-ratio: 16/9; }
  .card-wide.card-md { width: 400px; }
  .card-wide.card-lg { width: 540px; }

  /* ─── PROGRESS BAR ─── */
  .progress-bar {
    height: 3px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }


  /* ─── SECTION DIVIDER ─── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 48px 0 32px;
    padding: 0 40px;
    color: var(--text-muted);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .section-divider::before,
  .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }

  /* ─── STREAMING SERVICES ─── */
  .channels-scroll-wrap {
    overflow-x: auto;
    overflow-y: visible;
    scrollbar-width: none;
    margin-bottom: 48px;
    padding-bottom: 8px;
  }
  .channels-scroll-wrap::-webkit-scrollbar { display: none; }
  .channels-row {
    display: flex;
    gap: 12px;
    padding: 2px 40px;
    width: max-content;
  }
  .channel-chip {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    background: var(--surface);
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
    flex: 0 0 auto;
    width: 220px;
  }
  .channel-chip:hover {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-3px);
  }
  .channel-logo {
    width: 44px; height: 44px;
    border-radius: 8px;
    object-fit: contain;
    object-position: center;
    flex-shrink: 0;
    background: #fff;
    padding: 5px;
  }
  .channel-logo-fallback {
    width: 44px; height: 44px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 900; letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .channel-info { overflow: hidden; }
  .channel-name {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .channel-count {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* ─── TOAST NOTIFICATION ─── */
  .toast {
    position: fixed;
    bottom: 40px;
    right: 60px;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.1);
    border-left: 3px solid var(--accent);
    border-radius: 8px;
    padding: 16px 24px;
    z-index: 200;
    font-size: 14px;
    font-weight: 500;
    transform: translateX(200%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(20px);
    min-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(0); }
  .toast-icon { font-size: 20px; }

  /* ─── MODAL OVERLAY ─── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(10px);
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 16px;
    width: min(780px, 92vw);
    max-height: 90vh;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    transform: scale(0.92);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .modal::-webkit-scrollbar { display: none; }
  .modal-backdrop.open .modal { transform: scale(1); }

  .modal-hero {
    height: 320px;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .modal-hero-img {
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    position: absolute; inset: 0;
    transition: opacity 0.4s;
  }
  .modal-hero-gradient {
    position: absolute; inset: 0;
    background: linear-gradient(to top, var(--surface) 0%, rgba(19,19,29,0.6) 50%, transparent 100%);
  }
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    width: 36px; height: 36px;
    border-radius: 50%;
    background: rgba(0,0,0,0.65);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--accent); }

  /* Постер поверх hero */
  .modal-body {
    padding: 28px 32px 32px;
  }
  .modal-top-row {
    margin-bottom: 16px;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 36px;
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 8px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .modal-meta {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    color: var(--text-dim); font-size: 13px; margin-bottom: 0;
  }
  .modal-meta .dot-sep {
    width: 3px; height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 50%; display: inline-block;
  }
  .modal-score { color: #facc15; font-weight: 700; }
  .modal-genre-tag {
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text-dim);
  }

  .modal-desc {
    color: var(--text-dim);
    line-height: 1.65;
    margin-bottom: 24px;
    font-size: 14px;
  }

  /* Кнопки действий */
  .modal-actions {
    display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .btn-mylist {
    display: inline-flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 14px; font-weight: 600;
    padding: 12px 22px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-mylist:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.4); }
  .btn-mylist.in-list {
    background: rgba(123,47,255,0.2);
    border-color: var(--accent);
    color: #c4a0ff;
  }
  .btn-mylist .mylist-icon { font-size: 16px; transition: transform 0.3s; }
  .btn-mylist.in-list .mylist-icon { transform: scale(1.2); }

  /* Создатели */
  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
  }
  .modal-creators {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 20px;
    margin-bottom: 28px;
  }
  .modal-creator-item {
    display: flex;
    flex-direction: column;
  }
  .modal-creator-role {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .modal-creator-name {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }

  /* Creators CSS удалён — объединён с cast */

  /* Единый скролл: crew + актёры */
  .modal-cast-scroll {
    overflow-x: auto;
    scrollbar-width: none;
    margin: 0 -32px;
    padding: 4px 32px 4px;
  }
  .modal-cast-scroll::-webkit-scrollbar { display: none; }
  .modal-cast-track {
    display: flex;
    gap: 14px;
    width: max-content;
  }
  .cast-card {
    width: 88px;
    flex-shrink: 0;
    text-align: center;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .cast-card:hover { transform: translateY(-4px); }
  .cast-photo {
    width: 88px; height: 110px;
    border-radius: 10px;
    object-fit: cover;
    object-position: top;
    background: var(--surface2);
    display: block;
    margin-bottom: 7px;
  }
  .cast-photo-placeholder {
    width: 88px; height: 110px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; opacity: 0.4;
    margin-bottom: 7px;
  }
  .cast-name {
    font-size: 11px; font-weight: 600;
    color: #fff; line-height: 1.3;
  }
  .cast-character {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 88px;
  }
  /* Роль crew — акцентный цвет, чтобы отличать от актёрских персонажей */
  .cast-character.is-crew {
    color: var(--accent);
    font-weight: 600;
  }

  /* Скелетон */
  .cast-skeleton {
    width: 88px; flex-shrink: 0;
  }
  .cast-skeleton-photo {
    width: 88px; height: 110px;
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 7px;
  }

  /* ─── SEARCH OVERLAY ─── */
  .search-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 600;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
    backdrop-filter: blur(16px);
  }
  .search-overlay.open { opacity: 1; pointer-events: all; }

  .search-box {
    position: sticky; top: 0;
    padding: 32px 60px 24px;
    background: transparent;
    z-index: 2;
  }
  .search-input-wrap {
    display: flex;
    align-items: center;
    gap: 16px;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 0 20px;
    transition: border-color 0.2s;
  }
  .search-input-wrap:focus-within {
    border-color: var(--accent);
    background: rgba(255,255,255,0.09);
  }
  .search-icon { color: var(--text-muted); flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: none; border: none; outline: none;
    color: #fff;
    font-size: 22px;
    font-family: 'Barlow', sans-serif;
    font-weight: 400;
    padding: 18px 0;
    caret-color: var(--accent);
  }
  .search-input::placeholder { color: var(--text-muted); }
  .search-close-btn {
    background: none; border: none;
    color: var(--text-muted);
    font-size: 22px; cursor: pointer;
    padding: 4px; line-height: 1;
    transition: color 0.2s;
    flex-shrink: 0;
  }
  .search-close-btn:hover { color: #fff; }

  .search-results {
    padding: 0 60px 60px;
    overflow-y: auto;
    max-height: calc(100vh - 130px);
    scrollbar-width: none;
  }
  .search-results::-webkit-scrollbar { display: none; }

  .search-status {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    padding: 60px 0;
  }
  .search-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    margin-top: 28px;
  }
  .search-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 16px;
    margin-bottom: 8px;
  }

  .search-count {
    font-size: 13px;
    color: var(--text-muted);
    padding: 8px 0 20px;
  }
  .search-count strong { color: var(--text-dim); }

  @keyframes searchCardIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .search-card-appear {
    animation: searchCardIn 0.3s ease both;
  }

  /* ─── MY LIST PAGE ─── */
  .mylist-page {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 220;
    overflow-y: auto; overflow-x: hidden;
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.77,0,0.18,1);
    scrollbar-width: none;
  }
  .mylist-page::-webkit-scrollbar { display: none; }
  .mylist-page.open { transform: translateX(0); }

  .mylist-header {
    position: sticky; top: 0; z-index: 50;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98) 80%, transparent);
    padding: 24px 60px 20px;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex; align-items: center; gap: 24px;
  }
  .mylist-back {
    display: inline-flex; align-items: center; gap: 8px;
    background: none; border: none;
    color: var(--text-dim); font-size: 15px; font-weight: 600;
    cursor: pointer; padding: 0; transition: color 0.2s;
  }
  .mylist-back:hover { color: #fff; }
  .mylist-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: #fff;
  }
  .mylist-count {
    font-size: 13px; color: var(--text-muted);
    margin-left: auto;
  }
  .mylist-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
    padding: 32px 60px 80px;
  }

  .mylist-remove-btn {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.7);
    color: #e53e3e;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: opacity 0.2s, background 0.2s, transform 0.2s;
    z-index: 10;
    backdrop-filter: blur(4px);
  }
  .card:hover .mylist-remove-btn {
    opacity: 1;
  }
  .mylist-remove-btn:hover {
    background: rgba(229, 62, 62, 0.85);
    color: #fff;
    transform: translateX(-50%) scale(1.1);
  }
  .mylist-empty {
    text-align: center;
    padding: 120px 60px;
    color: var(--text-muted);
  }
  .mylist-empty-icon { font-size: 56px; margin-bottom: 20px; }
  .mylist-empty-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text-dim); }
  .mylist-empty-sub { font-size: 14px; line-height: 1.6; }

  .mylist-tabs {
    display: flex;
    gap: 8px;
    padding: 20px 60px 0;
    flex-wrap: wrap;
  }
  .mylist-tab {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    color: var(--text-dim);
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    padding: 7px 18px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mylist-tab:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .mylist-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* ─── FOCUS RING for TV nav ─── */
  .focusable:focus-within, .focusable:focus {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* ─── TV SPATIAL NAVIGATION ─── */
  [data-tv-focusable] {
    outline: none;
  }
  [data-tv-focusable].tv-focused {
    outline: 3px solid var(--accent);
    outline-offset: 3px;
    z-index: 11;
    position: relative;
  }
  /* Special focus styles per element type */
  .card.tv-focused {
    transform: scale(1.07) translateY(-8px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 3px var(--accent), 0 0 30px var(--accent-glow);
    outline: none;
  }
  .pill.tv-focused {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 20px var(--accent-glow);
    outline: none;
  }
  .channel-chip.tv-focused {
    border-color: var(--accent);
    background: var(--surface2);
    transform: translateY(-3px);
    box-shadow: 0 8px 30px var(--accent-glow);
    outline: none;
  }
  .nav-links li a.tv-focused {
    color: #fff;
    border-bottom-color: var(--accent);
    outline: none;
    text-shadow: 0 0 12px var(--accent-glow);
  }
  .nav-icon.tv-focused,
  .avatar.tv-focused {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    outline: none;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn-play.tv-focused {
    background: #e8e0ff;
    transform: scale(1.04);
    box-shadow: 0 8px 40px rgba(123,47,255,0.4);
    outline: none;
  }
  .btn-info.tv-focused,
  .btn-mylist.tv-focused {
    background: rgba(123,47,255,0.3);
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .hero-arrow.tv-focused {
    background: var(--accent);
    border-color: var(--accent);
    transform: scale(1.1);
    outline: none;
  }
  .mylist-tab.tv-focused {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    outline: none;
  }
  /* Browse grid cards */
  .browse-grid .card.tv-focused,
  .mylist-grid .card.tv-focused,
  .search-grid .card.tv-focused {
    transform: scale(1.05);
    box-shadow: 0 12px 40px rgba(0,0,0,0.7), 0 0 0 3px var(--accent), 0 0 24px var(--accent-glow);
    outline: none;
  }
  /* Back buttons */
  .detail-back.tv-focused,
  .browse-back.tv-focused,
  .mylist-back.tv-focused {
    color: #fff;
    outline: 2px solid var(--accent);
    outline-offset: 4px;
    border-radius: 4px;
  }
  /* TV mode indicator */
  .tv-mode-indicator {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 5px 14px;
    border-radius: 20px;
    z-index: 9998;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    text-transform: uppercase;
  }
  .tv-mode-indicator.show {
    opacity: 1;
  }

  /* ─── SCROLLBAR STYLE ─── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-content { animation: fadeIn 0.8s ease 0.2s both; }
  .content-area > * { animation: fadeIn 0.6s ease both; }
  .content-area > *:nth-child(1) { animation-delay: 0.3s; }
  .content-area > *:nth-child(2) { animation-delay: 0.45s; }
  .content-area > *:nth-child(3) { animation-delay: 0.6s; }
  .content-area > *:nth-child(4) { animation-delay: 0.75s; }

  /* ─── COLORS for generated art ─── */
  .c1 { background: linear-gradient(135deg, #1a0533 0%, #3d1a6b 40%, #1e0a3a 100%); }
  .c2 { background: linear-gradient(135deg, #001a33 0%, #003366 40%, #001a4d 100%); }
  .c3 { background: linear-gradient(135deg, #1a0a0a 0%, #4d1a1a 40%, #330d0d 100%); }
  .c4 { background: linear-gradient(135deg, #0a1a0a 0%, #1a4d1a 40%, #0d330d 100%); }
  .c5 { background: linear-gradient(135deg, #1a1a0a 0%, #4d4d00 40%, #333300 100%); }
  .c6 { background: linear-gradient(135deg, #0a0a1a 0%, #1a1a66 40%, #0d0d44 100%); }
  .c7 { background: linear-gradient(135deg, #1a0a14 0%, #4d1a3a 40%, #330d26 100%); }
  .c8 { background: linear-gradient(135deg, #0a1a1a 0%, #004d4d 40%, #003333 100%); }

  /* Abstract art overlays for cards */
  .art-shapes {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .art-shapes::before {
    content: '';
    position: absolute;
    width: 140%; height: 140%;
    top: -20%; left: -20%;
    background: radial-gradient(ellipse at 60% 30%, rgba(255,255,255,0.08) 0%, transparent 60%);
  }
  .art-shapes::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; top: 40%;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
  }
  .art-title {
    position: absolute;
    bottom: 14px; left: 14px; right: 14px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    z-index: 2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    line-height: 1.1;
  }
  .art-year {
    position: absolute;
    top: 12px; left: 14px;
    font-size: 11px;
    color: var(--text-muted);
    z-index: 2;
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  /* ─── SKELETON LOADER ─── */
  .skeleton-card { pointer-events: none; }
  .skeleton-shimmer {
    width: 100%; height: 100%;
    background: linear-gradient(90deg,
      var(--surface) 0%, var(--surface2) 40%, var(--surface) 80%);
    background-size: 200% 100%;
    animation: shimmer 1.6s infinite;
    border-radius: var(--card-radius);
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* ─── CARD EXTRAS ─── */
  .card-rating {
    position: absolute;
    top: 10px; left: 10px;
    background: rgba(0,0,0,0.65);
    color: #facc15;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 4px;
    backdrop-filter: blur(6px);
    z-index: 3;
  }

  .card-progress-label {
    font-size: 11px;
    color: var(--text-muted);
    padding: 4px 2px 0;
    font-weight: 500;
  }

  .card-art-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a0533 0%, #3d1a6b 100%);
    padding: 16px;
    text-align: center;
  }
  .card-art-fallback span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    line-height: 1.2;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  /* ─── DETAIL PAGE ─── */
  .detail-page {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 210;
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.77, 0, 0.18, 1);
    scrollbar-width: none;
  }
  .detail-page::-webkit-scrollbar { display: none; }
  .detail-page.open { transform: translateX(0); }

  .detail-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98) 80%, transparent 100%);
    padding: 24px 40px 28px;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .detail-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    margin-bottom: 20px;
    transition: color 0.2s;
    letter-spacing: 0.02em;
  }
  .detail-back:hover { color: #fff; }

  .detail-identity {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .detail-logo {
    width: 80px; height: 80px;
    border-radius: 16px;
    object-fit: contain;
    background: #fff;
    padding: 8px;
    flex-shrink: 0;
  }

  .detail-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 42px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1;
    color: #fff;
  }

  .detail-location {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 6px;
    font-weight: 500;
  }

  .detail-rows {
    padding: 32px 0 80px;
  }

  /* ── SECTION PAGE (Movies / Series) ─────────────────────── */
  .section-page {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.77, 0, 0.18, 1);
    scrollbar-width: none;
  }
  .section-page::-webkit-scrollbar { display: none; }
  .section-page.open { transform: translateX(0); }

  /* section-header removed — nav handles navigation */

  /* section-back removed — nav handles navigation */

  /* section-identity removed — nav handles section indication */

  .section-rows {
    padding: 0 0 80px;
    margin-top: 0;
  }

  /* ── SECTION HERO (inline hero within section pages) ───── */
  .section-hero-wrap {
    margin-top: 0;
    padding-top: 0;
  }
  .section-hero {
    position: relative;
    width: 100%;
    height: 70vh;
    min-height: 540px;
    overflow: hidden;
  }
  .section-hero .hero-slides {
    position: absolute;
    inset: 0;
    display: flex;
    transition: transform 0.7s cubic-bezier(0.77, 0, 0.18, 1);
    will-change: transform;
    z-index: 1;
  }
  .section-hero .hero-slide {
    flex: 0 0 100%;
    position: relative;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }
  .section-hero .hero-slide-bg {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center top;
    transition: transform 8s ease;
    transform: scale(1.05);
  }
  .section-hero .hero-slide.active .hero-slide-bg {
    transform: scale(1.0);
  }
  .section-hero .hero-slide::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(to right,  rgba(10,10,15,0.96) 0%, rgba(10,10,15,0.55) 45%, rgba(10,10,15,0.15) 75%, transparent 100%),
      linear-gradient(to top,    rgba(10,10,15,1.00) 0%, rgba(10,10,15,0.3)  30%, transparent 65%),
      linear-gradient(to bottom, rgba(10,10,15,0.6)  0%, transparent 20%);
    z-index: 2;
  }
  .section-hero .hero-bg {
    position: absolute; inset: 0;
    z-index: 3;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(10,10,15,0.35) 0%, transparent 18%);
  }
  .section-hero .hero-content {
    position: absolute;
    left: 40px;
    bottom: 80px;
    z-index: 10;
    max-width: 680px;
    transition: opacity 0.4s ease, transform 0.4s ease;
    animation: fadeIn 0.8s ease 0.2s both;
  }
  .section-hero .hero-content.transitioning {
    opacity: 0;
    transform: translateY(14px);
  }

  .section-hero .hero-nav {
    position: absolute;
    bottom: 28px;
    right: 40px;
    z-index: 10;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  /* ── BROWSE PAGE (3rd level — See All grid) ─────────────── */
  .browse-page {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 300;
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateX(100%);
    transition: transform 0.45s cubic-bezier(0.77, 0, 0.18, 1);
    scrollbar-width: none;
  }
  .browse-page::-webkit-scrollbar { display: none; }
  .browse-page.open { transform: translateX(0); }

  .browse-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: linear-gradient(to bottom, rgba(10,10,15,0.98) 80%, transparent 100%);
    padding: 24px 40px 20px;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .browse-back {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    padding: 0;
    transition: color 0.2s;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .browse-back:hover { color: #fff; }

  .browse-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: #fff;
    line-height: 1;
  }

  .browse-count {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
    margin-left: auto;
    flex-shrink: 0;
  }

  .browse-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    padding: 32px 40px 100px;
  }

  .browse-grid .card {
    width: 100%;
  }

  .browse-load-more {
    display: flex;
    justify-content: center;
    padding: 0 40px 80px;
  }

  .btn-load-more {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 14px 40px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-load-more:hover {
    background: rgba(255,255,255,0.13);
    border-color: rgba(255,255,255,0.3);
  }
  .btn-load-more:disabled {
    opacity: 0.35;
    cursor: default;
  }

  /* ═══════════════════════════════════════════════════════════
     ANDROID TV WebView — Performance Optimizations
     Activated when JS sets <body class="tv-device">
     Цель: убрать дорогие GPU-эффекты, ускорить transitions,
     снизить нагрузку на compositor thread Android WebView.
  ═══════════════════════════════════════════════════════════ */

  /* ── 1. Уничтожаем backdrop-filter — главный GPU-убийца ── */
  body.tv-device .btn-info,
  body.tv-device .hero-arrow,
  body.tv-device .toast,
  body.tv-device .card-rating,
  body.tv-device .modal-backdrop,
  body.tv-device .search-overlay,
  body.tv-device .mylist-header,
  body.tv-device .browse-header,
  body.tv-device .detail-header,
  body.tv-device .mylist-remove-btn {
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
  }

  /* Заменяем blur-фоны на непрозрачные аналоги */
  body.tv-device .btn-info              { background: rgba(15,15,28,0.90); }
  body.tv-device .hero-arrow            { background: rgba(15,15,28,0.84); }
  body.tv-device .toast                 { background: var(--surface2); box-shadow: 0 4px 16px rgba(0,0,0,0.5); }
  body.tv-device .card-rating           { background: rgba(0,0,0,0.72); }
  body.tv-device .modal-backdrop        { background: rgba(0,0,0,0.93); }
  body.tv-device .search-overlay        { background: rgba(10,10,15,0.97); }
  body.tv-device .mylist-header,
  body.tv-device .browse-header,
  body.tv-device .detail-header         { background: rgba(10,10,15,0.99); }
  body.tv-device .mylist-remove-btn     { background: rgba(0,0,0,0.72); }

  /* ── 2. Отключаем Ken Burns — дорогая 8-секундная анимация ── */
  body.tv-device .hero-slide-bg {
    transition: none !important;
    transform: none !important;
  }
  body.tv-device .section-hero .hero-slide-bg {
    transition: none !important;
    transform: none !important;
  }

  /* ── 3. Упрощаем hero-градиенты (3 слоя → 2) ──────────── */
  body.tv-device .hero-slide::after,
  body.tv-device .section-hero .hero-slide::after {
    background:
      linear-gradient(to right, rgba(10,10,15,0.96) 0%, rgba(10,10,15,0.50) 48%, transparent 78%),
      linear-gradient(to top,   rgba(10,10,15,0.98) 0%, transparent 52%);
  }

  /* ── 4. Ускоряем transitions ─────────────────────────────── */
  body.tv-device .card                  { transition: transform 0.16s ease, box-shadow 0.16s; }
  body.tv-device .hero-slides,
  body.tv-device .section-hero .hero-slides { transition: transform 0.45s ease; }
  body.tv-device .modal                 { transition: transform 0.22s ease; }
  body.tv-device .modal-backdrop        { transition: opacity 0.18s; }
  body.tv-device .search-overlay        { transition: opacity 0.14s; }
  body.tv-device .mylist-page,
  body.tv-device .detail-page,
  body.tv-device .section-page,
  body.tv-device .browse-page           { transition: transform 0.28s ease; }
  body.tv-device .card-overlay          { transition: none; }
  body.tv-device .hero-dot              { transition: width 0.2s, background 0.2s, border-radius 0.2s; }
  body.tv-device .nav-links li a        { transition: color 0.15s; }
  body.tv-device .channel-chip          { transition: border-color 0.15s, background 0.15s, transform 0.15s; }

  /* ── 5. Убираем stagger-анимации загрузки ────────────────── */
  body.tv-device .hero-content,
  body.tv-device .section-hero .hero-content { animation: none; opacity: 1; transform: none; }
  body.tv-device .content-area > *      { animation: none !important; opacity: 1; transform: none; }

  /* ── 6. Отключаем blink-анимацию точки hero-тега ────────── */
  body.tv-device .hero-tag .dot         { animation: none; opacity: 1; }

  /* ── 7. Упрощаем тени (меньший blur radius) ─────────────── */
  body.tv-device .card:hover            { box-shadow: 0 10px 22px rgba(0,0,0,0.65), 0 0 0 2px var(--accent); }
  body.tv-device .card.tv-focused       { box-shadow: 0 10px 22px rgba(0,0,0,0.65), 0 0 0 3px var(--accent); }
  body.tv-device .browse-grid .card.tv-focused,
  body.tv-device .mylist-grid .card.tv-focused,
  body.tv-device .search-grid .card.tv-focused { box-shadow: 0 8px 18px rgba(0,0,0,0.65), 0 0 0 3px var(--accent); }
  body.tv-device .btn-play:hover,
  body.tv-device .btn-play.tv-focused   { box-shadow: 0 4px 18px rgba(123,47,255,0.35); }
  /* Убираем glow-тени у focused TV-элементов (только outline) */
  body.tv-device .nav-icon.tv-focused,
  body.tv-device .avatar.tv-focused,
  body.tv-device .btn-info.tv-focused,
  body.tv-device .btn-mylist.tv-focused,
  body.tv-device .channel-chip.tv-focused,
  body.tv-device .hero-arrow.tv-focused,
  body.tv-device .pill.tv-focused       { box-shadow: 0 0 0 2px var(--accent); }

  /* ── 8. Убираем дорогие text-shadow и gradient на тексте ─── */
  body.tv-device .hero-title            { text-shadow: 0 2px 8px rgba(0,0,0,0.9); }
  body.tv-device .nav-links li a.tv-focused { text-shadow: none; }
  body.tv-device .art-title            { text-shadow: 0 1px 4px rgba(0,0,0,0.9); }

  /* Упрощаем gradient-текст логотипа */
  body.tv-device .logo {
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: #fff;
    color: #fff;
  }

  /* Упрощаем gradient-текст highlight в заголовках */
  body.tv-device .hero-title .highlight {
    background: none;
    -webkit-background-clip: unset;
    background-clip: unset;
    -webkit-text-fill-color: var(--accent);
    color: var(--accent);
  }

  /* ── 9. CSS Containment — изолируем карточки ─────────────── */
  body.tv-device .card                  { contain: layout style; }

  /* ── 10. Упрощаем shimmer-скелетоны ─────────────────────── */
  body.tv-device .skeleton-shimmer {
    animation: none;
    background: var(--surface2);
  }

  /* ── 11. Отключаем анимацию появления search-карточек ────── */
  body.tv-device .search-card-appear    { animation: none; opacity: 1; }

  /* ── 12. content-visibility для off-screen строк ─────────── */
  body.tv-device .row {
    content-visibility: auto;
    contain-intrinsic-size: 0 300px;
  }

  /* ── 13. art-shapes — убираем дорогой radial-gradient ────── */
  body.tv-device .art-shapes::before   { display: none; }

  /* ── 14. TV cursor — скрываем полностью ─────────────────── */
  body.tv-device #cursor                { display: none !important; }

  /* ═══════════════════════════════════════════════════════════
     v2 OPTIMIZATIONS — GPU Layers, Outline Focus, Virtual Cards
  ═══════════════════════════════════════════════════════════ */

  /* ── v2-1. GPU-слои ДО анимации (proactive promotion) ───────
     Без will-change браузер создаёт compositor layer прямо в
     момент hover/focus — это вызывает jank на слабом железе.
     С will-change слой уже готов, scale() идёт по compositor
     thread без участия main thread.                           */
  body.tv-device .card {
    will-change: transform;
  }
  /* Hero-slides уже имеют will-change в базовом CSS.
     Добавляем для страниц-слоёв — slide-in transition
     происходит без main-thread involvement.                   */
  body.tv-device .mylist-page,
  body.tv-device .detail-page,
  body.tv-device .section-page,
  body.tv-device .browse-page,
  body.tv-device .modal {
    will-change: transform;
  }
  /* Снимаем will-change у элементов, которые не анимируются
     постоянно — экономим GPU memory для TV-боксов с 2GB RAM. */
  body.tv-device .channel-chip,
  body.tv-device .cast-card {
    will-change: auto;
  }

  /* ── v2-2. outline вместо box-shadow для TV focus-колец ─────
     box-shadow: требует repaint всей карточки + соседних.
     outline: рисуется compositor-ом, не вызывает layout/paint
     соседних элементов — критично для D-pad навигации по ряду. */
  body.tv-device .card.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
    /* scale остаётся — он уже на GPU compositor layer */
  }
  body.tv-device .browse-grid .card.tv-focused,
  body.tv-device .mylist-grid .card.tv-focused,
  body.tv-device .search-grid .card.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  body.tv-device .channel-chip.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  body.tv-device .nav-icon.tv-focused,
  body.tv-device .avatar.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  body.tv-device .btn-info.tv-focused,
  body.tv-device .btn-mylist.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  body.tv-device .hero-arrow.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }
  body.tv-device .pill.tv-focused {
    box-shadow: none;
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* ── v2-3. content-visibility на отдельных карточках ────────
     Дополняет content-visibility на .row.
     Карточки за пределами viewport полностью пропускают
     layout + paint + composite — эквивалент "виртуального
     списка" без JS-оверхеда.
     contain-intrinsic-size: точные размеры карт по типу.     */
  body.tv-device .card-poster-sm { content-visibility: auto; contain-intrinsic-size: 180px 270px; }
  body.tv-device .card-poster-md { content-visibility: auto; contain-intrinsic-size: 240px 360px; }
  body.tv-device .card-poster-lg { content-visibility: auto; contain-intrinsic-size: 320px 480px; }
  body.tv-device .card-wide-sm   { content-visibility: auto; contain-intrinsic-size: 320px 180px; }
  body.tv-device .card-wide-md   { content-visibility: auto; contain-intrinsic-size: 420px 236px; }
  body.tv-device .card-wide-lg   { content-visibility: auto; contain-intrinsic-size: 560px 315px; }
  body.tv-device .card-square-sm { content-visibility: auto; contain-intrinsic-size: 160px 160px; }
  body.tv-device .card-square-md { content-visibility: auto; contain-intrinsic-size: 220px 220px; }

  /* Но для tv-focused карточки content-visibility должна быть visible
     чтобы браузер не пропустил её рендер при scroll-to-focus.       */
  body.tv-device .card.tv-focused {
    content-visibility: visible;
  }

</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════
//  ANDROID TV DEVICE DETECTION + EARLY OPTIMIZATIONS
//  Запускается до любого другого кода — применяет класс
//  body.tv-device и задаёт IS_TV_DEVICE для всего приложения.
// ═══════════════════════════════════════════════════════════
const IS_TV_DEVICE = (function() {
  const ua = navigator.userAgent || '';
  // Явные TV-индикаторы в User-Agent
  if (/Android TV|AFTM|AFTRS|AFTB|Fire TV|FireTV|Nexus Player|SHIELD TV|BRAVIA|Hisense|Philips TV|LG NetCast/i.test(ua)) return true;
  // Android без Mobile/Tablet = большой экран (TV или TV-бокс)
  if (/Android/i.test(ua) && !/Mobile|Tablet/i.test(ua)) return true;
  // Десктопное окно 1920+ px — разработка/тестирование на большом экране
  if (window.screen.width >= 1920 && window.devicePixelRatio <= 1 && !('ontouchstart' in window)) return true;
  return false;
})();

if (IS_TV_DEVICE) {
  document.body.classList.add('tv-device');
}

// ── Page Visibility API — пауза слайдера когда приложение скрыто ──
// (Важно для Android TV: WebView часто уходит в фон при переключении)
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    clearInterval(heroTimer);
    clearInterval(sectionHeroTimer);
  } else {
    if (typeof heroItems !== 'undefined' && heroItems.length) resetAutoplay();
    if (typeof sectionHeroItems !== 'undefined' && sectionHeroItems.length) startSectionAutoplay();
  }
});

// ═══════════════════════════════════════════════════════════
//  TMDB API INTEGRATION
// ═══════════════════════════════════════════════════════════
const TMDB_KEY  = '890cec001f63b935c6bd4538ac1d146d';
const TMDB_BASE = 'https://api.themoviedb.org/3';
const IMG_BASE  = 'https://image.tmdb.org/t/p';

const GENRE_MAP = {
  28:'Action',18:'Drama',35:'Comedy',27:'Horror',878:'Sci-Fi',
  10765:'Sci-Fi & Fantasy',10759:'Action & Adventure',80:'Crime',
  99:'Documentary',10751:'Family',14:'Fantasy',36:'History',
  10402:'Music',9648:'Mystery',10749:'Romance',53:'Thriller',
  10770:'TV Movie',37:'Western',16:'Animation',12:'Adventure'
};

// ─── CURSOR (optimized: transform + rAF) ───
const cursor = document.getElementById('cursor');
let cursorX = 0, cursorY = 0, cursorRAF = false;
document.addEventListener('mousemove', e => {
  cursorX = e.clientX - 10;  // offset by half default size
  cursorY = e.clientY - 10;
  if (!cursorRAF) {
    cursorRAF = true;
    requestAnimationFrame(() => {
      cursor.style.transform = `translate3d(${cursorX}px,${cursorY}px,0)`;
      cursorRAF = false;
    });
  }
});

// ─── EVENT DELEGATION ───────────────────────────────────────
// Single listener for all card clicks instead of per-card handlers
document.addEventListener('click', e => {
  // Card click → openModal (ignore if clicked on remove button)
  const card = e.target.closest('.card[data-item-id]');
  if (card && !e.target.closest('.mylist-remove-btn')) {
    const item = _cardItems.get(card.dataset.itemId);
    if (item) {
      openModal(item);
      // If card is inside search overlay, also close search
      if (card.closest('.search-overlay')) closeSearch();
    }
  }
});

// Cursor enlargement via delegation — one pair of listeners for all interactive elements
document.addEventListener('mouseenter', e => {
  if (e.target.closest('.card, .channel-chip, .hero-arrow, .nav-icon, .avatar, .pill, .btn-play, .btn-info, .btn-mylist')) {
    cursor.classList.add('big');
  }
}, true); // capture phase for mouseenter delegation

document.addEventListener('mouseleave', e => {
  if (e.target.closest('.card, .channel-chip, .hero-arrow, .nav-icon, .avatar, .pill, .btn-play, .btn-info, .btn-mylist')) {
    cursor.classList.remove('big');
  }
}, true);
function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ─── PILLS ───

// ─── KEYBOARD ───
// ═══════════════════════════════════════════════════════════
//  TV SPATIAL NAVIGATION ENGINE
// ═══════════════════════════════════════════════════════════
const TV = {
  active: false,          // whether TV/remote mode is active
  focused: null,          // currently focused DOM element
  lastMouseMove: 0,       // timestamp of last mouse move
  indicatorTimeout: null,

  // ── Get the active viewport container ──────────────────
  getActiveContainer() {
    // Priority: search > modal > browse > mylist > detail > section > home
    if (document.getElementById('search-overlay').classList.contains('open'))
      return document.getElementById('search-overlay');
    if (document.getElementById('modal-backdrop').classList.contains('open'))
      return document.getElementById('modal-box');
    if (document.getElementById('browse-page').classList.contains('open'))
      return document.getElementById('browse-page');
    if (document.getElementById('mylist-page').classList.contains('open'))
      return document.getElementById('mylist-page');
    if (document.getElementById('detail-page').classList.contains('open'))
      return document.getElementById('detail-page');
    if (document.getElementById('section-page').classList.contains('open'))
      return document.getElementById('section-page');
    return document.body;
  },

  // ── Collect all focusable elements in container ────────
  // Returns zones: array of { items[] } in visual top-to-bottom order
  getZones(container) {
    const zones = [];
    const isBody = container === document.body;
    const isSection = container === document.getElementById('section-page');

    // Nav is always first zone when visible (home or section pages)
    if (isBody || isSection) {
      const navItems = [
        ...document.querySelectorAll('.nav-links li a'),
        ...document.querySelectorAll('.nav-right .nav-icon, .nav-right .avatar')
      ];
      if (navItems.length) zones.push({ items: navItems, type: 'nav' });
    }

    // Hero actions — main hero (home) or section hero
    const heroContainer = isSection
      ? container.querySelector('.section-hero')
      : (isBody ? document.getElementById('hero-section') : null);
    if (heroContainer) {
      const heroButtons = [...heroContainer.querySelectorAll('.btn-play, .btn-info')];
      if (heroButtons.length) zones.push({ items: heroButtons, type: 'hero-actions' });
    }

    // Detail/Browse/Mylist back buttons
    if (container.id === 'detail-page' || container.id === 'browse-page') {
      const back = container.querySelector('.detail-back, .browse-back');
      if (back) zones.push({ items: [back], type: 'back' });
    }
    if (container.id === 'mylist-page') {
      const back = container.querySelector('.mylist-back');
      if (back) zones.push({ items: [back], type: 'back' });
      // tabs and grid are collected by querySelectorAll below
    }
    // Search close button
    if (container.id === 'search-overlay') {
      const closeBtn = container.querySelector('.search-close-btn');
      if (closeBtn) zones.push({ items: [closeBtn], type: 'back' });
    }

    // Content root
    const contentRoot = isBody ? document.querySelector('.content-area')
                      : isSection ? container.querySelector('.section-rows')
                      : container;

    if (contentRoot) {
      const zoneContainers = contentRoot.querySelectorAll(
        '.channels-row, .cards-track, .browse-grid, .mylist-grid, .search-grid, .mylist-tabs'
      );

      zoneContainers.forEach(zc => {
        // Skip hero zones (already added above)
        if (heroContainer && heroContainer.contains(zc)) return;

        if (zc.classList.contains('channels-row')) {
          const chips = [...zc.querySelectorAll('.channel-chip')];
          if (chips.length) zones.push({ items: chips, type: 'channels' });
        }
        else if (zc.classList.contains('cards-track')) {
          const cards = [...zc.querySelectorAll('.card:not(.skeleton-card)')];
          if (cards.length) zones.push({ items: cards, type: 'cards' });
        }
        else if (zc.classList.contains('browse-grid') || zc.classList.contains('mylist-grid') || zc.classList.contains('search-grid')) {
          const cards = [...zc.querySelectorAll('.card')];
          if (cards.length) {
            // Determine columns from CSS grid
            const style = getComputedStyle(zc);
            const cols = style.gridTemplateColumns
              ? style.gridTemplateColumns.split(' ').filter(s => s && s !== 'none').length
              : Math.max(1, Math.round(zc.clientWidth / (cards[0]?.offsetWidth + 16 || 180)));
            const colCount = Math.max(1, cols);
            for (let i = 0; i < cards.length; i += colCount) {
              zones.push({ items: cards.slice(i, i + colCount), type: 'grid' });
            }
          }
        }
        else if (zc.classList.contains('mylist-tabs')) {
          const tabs = [...zc.querySelectorAll('.mylist-tab')];
          if (tabs.length) zones.push({ items: tabs, type: 'mylist-tabs' });
        }
      });
    }

    // Modal buttons
    if (container.id === 'modal-box') {
      const modalBtns = [...document.querySelectorAll('#modal-box .btn-play, #modal-box .btn-mylist, #modal-box .btn-info, .modal-close')];
      if (modalBtns.length) zones.push({ items: modalBtns, type: 'modal-actions' });
    }

    // Load more button
    const loadBtn = container.querySelector('.btn-load-more');
    if (loadBtn && !loadBtn.disabled) {
      zones.push({ items: [loadBtn], type: 'button' });
    }

    return zones;
  },

  // ── Set focus on element ──────────────────────────────
  setFocus(el) {
    if (TV.focused) TV.focused.classList.remove('tv-focused');
    if (!el) { TV.focused = null; return; }
    TV.focused = el;
    el.classList.add('tv-focused');

    // Guard against mousemove during programmatic scroll
    _tvScrollGuard = true;
    clearTimeout(TV._scrollGuardTimer);
    TV._scrollGuardTimer = setTimeout(() => { _tvScrollGuard = false; }, 600);

    // 1. Scroll container so the element's zone is in view
    // Special case: hero zone — scroll to very top to show full splash
    const isHeroZone = !!el.closest('.hero, .section-hero, .section-hero-wrap');

    const scrollableParent = el.closest('.section-page, .detail-page, .browse-page, .mylist-page, .search-results, .modal');
    const zone = el.closest('.row, .channels-scroll-wrap, .browse-grid, .mylist-grid, .search-grid, .mylist-tabs, .modal-actions, .hero, .section-hero, .hero-actions, .section-hero-wrap');
    const scrollTarget = zone || el;
    const targetRect = scrollTarget.getBoundingClientRect();

    if (isHeroZone) {
      // Scroll to absolute top
      if (scrollableParent) {
        scrollableParent.scrollTo({ top: 0, behavior: 'smooth' });
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    } else if (scrollableParent) {
      const parentRect = scrollableParent.getBoundingClientRect();
      if (targetRect.bottom > parentRect.bottom - 60) {
        scrollableParent.scrollBy({ top: targetRect.bottom - parentRect.bottom + 120, behavior: 'smooth' });
      } else if (targetRect.top < parentRect.top + 100) {
        scrollableParent.scrollBy({ top: targetRect.top - parentRect.top - 120, behavior: 'smooth' });
      }
    } else {
      // Home page — scroll window
      if (targetRect.bottom > window.innerHeight - 60) {
        window.scrollBy({ top: targetRect.bottom - window.innerHeight + 120, behavior: 'smooth' });
      } else if (targetRect.top < 100) {
        window.scrollBy({ top: targetRect.top - 120, behavior: 'smooth' });
      }
    }

    // 2. Then scroll horizontal track so the element is visible
    const scrollWrap = el.closest('.row-scroll-wrap, .channels-scroll-wrap, .modal-cast-scroll');
    if (scrollWrap) {
      requestAnimationFrame(() => {
        const rect = el.getBoundingClientRect();
        const wrapRect = scrollWrap.getBoundingClientRect();
        if (rect.right > wrapRect.right - 60) {
          scrollWrap.scrollBy({ left: rect.right - wrapRect.right + 160, behavior: 'smooth' });
        } else if (rect.left < wrapRect.left + 60) {
          scrollWrap.scrollBy({ left: rect.left - wrapRect.left - 160, behavior: 'smooth' });
        }
      });
    }

    // Enlarge cursor
    cursor.classList.add('big');
  },

  _scrollGuardTimer: null,

  // ── Activate TV mode ──────────────────────────────────
  activate() {
    if (TV.active) return;
    TV.active = true;
    document.body.style.cursor = 'none';
    document.getElementById('cursor').style.display = 'none';
    const ind = document.getElementById('tv-indicator');
    ind.classList.add('show');
    clearTimeout(TV.indicatorTimeout);
    TV.indicatorTimeout = setTimeout(() => ind.classList.remove('show'), 2000);

    // Resume from last position if available
    if (TV.focused && TV.focused.isConnected) {
      TV.focused.classList.add('tv-focused');
      return;
    }

    // Otherwise focus first meaningful element
    TV.focused = null;
    const zones = TV.getZones(TV.getActiveContainer());
    if (zones.length > 1 && zones[1].items.length) {
      TV.setFocus(zones[1].items[0]);
    } else if (zones.length && zones[0].items.length) {
      TV.setFocus(zones[0].items[0]);
    }
  },

  // ── Deactivate TV mode (back to mouse) ────────────────
  deactivate() {
    if (!TV.active) return;
    TV.active = false;
    document.body.style.cursor = 'none'; // keep custom cursor
    document.getElementById('cursor').style.display = '';
    document.getElementById('tv-indicator').classList.remove('show');
    // Remove visual focus ring but KEEP the reference
    // so pressing arrow keys resumes from last position
    if (TV.focused) TV.focused.classList.remove('tv-focused');
    cursor.classList.remove('big');
  },

  // ── Find which zone and index the focused element is in ─
  findCurrent(zones) {
    if (!TV.focused) return { zoneIdx: -1, itemIdx: -1 };
    for (let z = 0; z < zones.length; z++) {
      const idx = zones[z].items.indexOf(TV.focused);
      if (idx >= 0) return { zoneIdx: z, itemIdx: idx };
    }
    return { zoneIdx: -1, itemIdx: -1 };
  },

  // ── Navigate ──────────────────────────────────────────
  // Track last horizontal index ratio for smooth vertical navigation
  navigate(direction) {
    TV.activate();
    const container = TV.getActiveContainer();
    const zones = TV.getZones(container);
    if (!zones.length) return;

    let { zoneIdx, itemIdx } = TV.findCurrent(zones);

    // If nothing focused, focus first item
    if (zoneIdx < 0) {
      const startZone = zones.length > 1 ? 1 : 0;
      TV.setFocus(zones[startZone].items[0]);
      return;
    }

    const zone = zones[zoneIdx];

    switch (direction) {
      case 'left':
        if (itemIdx > 0) {
          TV.setFocus(zone.items[itemIdx - 1]);
        }
        break;

      case 'right':
        if (itemIdx < zone.items.length - 1) {
          TV.setFocus(zone.items[itemIdx + 1]);
        }
        break;

      case 'up': {
        if (zoneIdx > 0) {
          const prevZone = zones[zoneIdx - 1];
          // Use ratio-based positioning: same proportional position in the new zone
          const targetIdx = TV._getTargetIndex(prevZone, zone, itemIdx);
          TV.setFocus(prevZone.items[targetIdx]);
        }
        break;
      }

      case 'down': {
        if (zoneIdx < zones.length - 1) {
          const nextZone = zones[zoneIdx + 1];
          const targetIdx = TV._getTargetIndex(nextZone, zone, itemIdx);
          TV.setFocus(nextZone.items[targetIdx]);
        }
        break;
      }
    }
  },

  // ── Get target index when moving between zones vertically ──
  // Always focus first element, except for nav — focus active tab
  _getTargetIndex(targetZone, fromZone, fromIdx) {
    if (targetZone.type === 'nav') {
      // Find the active nav link
      const activeIdx = targetZone.items.findIndex(el => {
        const li = el.closest('li');
        return li && li.classList.contains('active');
      });
      return activeIdx >= 0 ? activeIdx : 0;
    }
    return 0;
  },

  // ── Activate focused element ──────────────────────────
  enter() {
    if (!TV.focused) return;
    TV.focused.click();
  },

  // ── Handle back/escape ────────────────────────────────
  back() {
    if (document.getElementById('search-overlay').classList.contains('open')) {
      closeSearch(); return true;
    }
    if (document.getElementById('modal-backdrop').classList.contains('open')) {
      closeModal(); return true;
    }
    if (document.getElementById('browse-page').classList.contains('open')) {
      closeBrowsePage(); return true;
    }
    if (document.getElementById('mylist-page').classList.contains('open')) {
      closeMyList(); return true;
    }
    if (document.getElementById('detail-page').classList.contains('open')) {
      closeDetailPage(); return true;
    }
    if (document.getElementById('section-page').classList.contains('open')) {
      closeSectionPage(); return true;
    }
    return false;
  }
};

// ─── KEYBOARD HANDLER ───────────────────────────────────────
document.addEventListener('keydown', e => {
  const key = e.key;

  // Arrow keys → activate TV mode and navigate
  if (key === 'ArrowUp' || key === 'ArrowDown' || key === 'ArrowLeft' || key === 'ArrowRight') {
    // Don't intercept if search input is focused
    if (document.activeElement === document.getElementById('search-input')) {
      if (key === 'ArrowDown') {
        // Escape input to navigate search results
        document.getElementById('search-input').blur();
        TV.navigate('down');
        e.preventDefault();
      }
      return;
    }
    e.preventDefault();
    const dir = key.replace('Arrow', '').toLowerCase();
    TV.navigate(dir);
    return;
  }

  // Enter → activate focused element
  if (key === 'Enter') {
    if (TV.active && TV.focused) {
      // Don't intercept if search input is focused
      if (document.activeElement === document.getElementById('search-input')) return;
      e.preventDefault();
      TV.enter();
      return;
    }
  }

  // Escape / Backspace → go back
  if (key === 'Escape' || key === 'Backspace') {
    if (document.activeElement === document.getElementById('search-input')) {
      if (key === 'Escape') closeSearch();
      return;
    }
    e.preventDefault();
    const wasModal = document.getElementById('modal-backdrop').classList.contains('open');
    TV.back();
    // Re-focus after navigation change — but NOT for modal (it restores focus itself)
    if (TV.active && !wasModal) {
      setTimeout(() => {
        // Only re-focus if nothing is currently focused (back cleared it)
        if (!TV.focused || !TV.focused.isConnected) {
          const zones = TV.getZones(TV.getActiveContainer());
          if (zones.length) {
            const startZone = zones.length > 1 ? 1 : 0;
            if (zones[startZone]?.items?.length) {
              TV.setFocus(zones[startZone].items[0]);
            }
          }
        }
      }, 500);
    }
    return;
  }

  // Ctrl/Cmd+K or / → open search
  if ((key === 'k' && (e.ctrlKey || e.metaKey)) || (key === '/' && !e.ctrlKey && document.activeElement.tagName !== 'INPUT')) {
    e.preventDefault();
    openSearch();
    return;
  }

  // Any letter key while in TV mode → open search and type
  if (TV.active && key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey) {
    if (document.activeElement !== document.getElementById('search-input')) {
      openSearch();
      // The character will be caught by the search input
    }
  }
});

// ─── MOUSE MOVEMENT → deactivate TV mode ────────────────────
// Only deactivate on REAL mouse movement (not phantom events from scroll)
let _tvLastMouseX = -1, _tvLastMouseY = -1;
let _tvScrollGuard = false; // set true during programmatic scrolls

document.addEventListener('mousemove', e => {
  if (!TV.active) {
    _tvLastMouseX = e.clientX;
    _tvLastMouseY = e.clientY;
    return;
  }
  // First event — just record position, don't deactivate
  if (_tvLastMouseX < 0) {
    _tvLastMouseX = e.clientX;
    _tvLastMouseY = e.clientY;
    return;
  }
  // Require meaningful movement (>5px) to deactivate
  const dx = Math.abs(e.clientX - _tvLastMouseX);
  const dy = Math.abs(e.clientY - _tvLastMouseY);
  _tvLastMouseX = e.clientX;
  _tvLastMouseY = e.clientY;
  if (dx + dy > 5 && !_tvScrollGuard) {
    TV.deactivate();
  }
});

// ─── SEARCH INPUT LIVE ───
document.getElementById('search-input').addEventListener('input', e => {
  const q = e.target.value.trim();
  clearTimeout(_searchTimer);
  if (!q) {
    _lastQuery = '';
    showSearchTrending();
    return;
  }
  if (q === _lastQuery) return;
  _searchTimer = setTimeout(() => runSearch(q), 320);
});

const MY_LIST_KEY = 'hbo_mylist_v1';

function myListGet() {
  try { return JSON.parse(localStorage.getItem(MY_LIST_KEY) || '[]'); }
  catch { return []; }
}
function myListSet(arr) {
  localStorage.setItem(MY_LIST_KEY, JSON.stringify(arr));
}
function myListHas(id) {
  return myListGet().some(i => i.id === id);
}
function myListToggle(item) {
  const list = myListGet();
  const idx  = list.findIndex(i => i.id === item.id);
  if (idx >= 0) {
    list.splice(idx, 1);
    myListSet(list);
    return false; // удалили
  } else {
    list.unshift({ // новые элементы сверху
      id:          item.id,
      title:       item.title || item.name,
      poster_path: item.poster_path,
      backdrop_path: item.backdrop_path,
      media_type:  item.media_type || (item.name ? 'tv' : 'movie'),
      vote_average: item.vote_average,
      release_date: item.release_date || item.first_air_date,
      overview:    item.overview,
      genre_ids:   item.genre_ids || [],
    });
    myListSet(list);
    return true; // добавили
  }
}

function openMyList() {
  const page = document.getElementById('mylist-page');
  page.scrollTop = 0;
  renderMyList();
  page.classList.add('open');
}
function closeMyList(resetNav = true) {
  document.getElementById('mylist-page').classList.remove('open');
  if (resetNav) {
    document.querySelectorAll('.nav-links li').forEach(li => {
      li.classList.toggle('active', li.dataset.page === 'home');
    });
  }
}

function renderMyList(filter = 'all') {
  const list    = myListGet();
  const content = document.getElementById('mylist-content');
  const countEl = document.getElementById('mylist-count');

  if (!list.length) {
    countEl.textContent = '';
    content.innerHTML = `
      <div class="mylist-empty">
        <div class="mylist-empty-icon">♡</div>
        <div class="mylist-empty-text">Your list is empty</div>
        <div class="mylist-empty-sub">Add movies and series by clicking<br>the ♡ button on any title.</div>
        <button class="btn-info" style="margin-top:28px;font-size:14px;padding:12px 28px;" onclick="closeMyList()">Browse Content</button>
      </div>`;
    return;
  }

  // ── Фильтрация ───────────────────────────────────────────
  const ANIME_GENRE = 210024; // keyword id, используем genre_ids как прокси
  const filtered = list.filter(item => {
    const g = item.genre_ids || [];
    const isAnimation = g.includes(16);
    const isAnime     = isAnimation && item.media_type === 'tv'; // грубая эвристика
    if (filter === 'movies')  return item.media_type === 'movie' && !isAnimation;
    if (filter === 'series')  return item.media_type === 'tv'    && !isAnimation;
    if (filter === 'animation') return isAnimation && !isAnime;
    if (filter === 'anime')   return isAnime;
    return true; // 'all'
  });

  countEl.textContent = `${filtered.length} of ${list.length} title${list.length !== 1 ? 's' : ''}`;

  // ── Фильтр-табы ─────────────────────────────────────────
  const tabs = [
    { key: 'all',       label: 'All'        },
    { key: 'movies',    label: 'Movies'     },
    { key: 'series',    label: 'Series'     },
    { key: 'animation', label: 'Animation'  },
    { key: 'anime',     label: 'Anime'      },
  ];
  const tabsHTML = `<div class="mylist-tabs">${
    tabs.map(t => `<button class="mylist-tab${filter === t.key ? ' active' : ''}"
      onclick="renderMyList('${t.key}')">${t.label}</button>`).join('')
  }</div>`;

  // ── Грид ─────────────────────────────────────────────────
  const grid = document.createElement('div');
  grid.className = 'mylist-grid';
  filtered.forEach(item => grid.appendChild(buildCard(item, 'poster', 'md')));

  content.innerHTML = tabsHTML;
  if (!filtered.length) {
    content.innerHTML += `<div class="mylist-empty" style="padding:60px;">
      <div class="mylist-empty-icon" style="font-size:36px;">🎬</div>
      <div class="mylist-empty-text">Nothing here yet</div>
    </div>`;
  } else {
    content.appendChild(grid);
  }
}
